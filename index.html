/* ===== OBIETTIVO DEL GIORNO (mini-missione che cambia ogni giorno) ===== */
const QUESTS = [
  { id:"floors",  type:"floors",  target:5,  key:"qFloors"  },
  { id:"windows", type:"windows", target:40, key:"qWindows" },
  { id:"rare",    type:"rare",    target:2,  key:"qRare"    },
  { id:"perfect", type:"perfect", target:3,  key:"qPerfect" },
];
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function ensureQuest(){
  let q = load("quest", null);
  const today = todayStr();
  if(!q || q.date !== today){
    const d = new Date();
    const idx = (d.getFullYear()*372 + d.getMonth()*31 + d.getDate()) % QUESTS.length;
    const tpl = QUESTS[idx];
    q = { id:tpl.id, type:tpl.type, target:tpl.target, key:tpl.key, prog:0, done:false, date:today };
    save("quest", q);
  }
  State.quest = q;
}
function questProgress(type, n){
  const q = State.quest; if(!q || q.done || q.type !== type) return;
  q.prog += (n || 1);
  if(q.prog >= q.target){
    q.prog = q.target; q.done = true;
    const reward = 50;
    addCoins(reward, innerWidth/2, innerHeight*0.45);
    Confetti.burst(innerWidth/2, innerHeight*0.42, 80);
    Audio.success();
    toast(T("questDone").replace("%c", reward + " 🪙"), 2200);
  }
  save("quest", q);
  renderQuest();
}
function renderQuest(){
  const el = document.getElementById("questBanner");
  if(!el || !State.quest) return;
  const q = State.quest;
  const label = T(q.key).replace("%n", q.target);
  el.innerHTML = `<span class="q-title">🎯 ${T("questTitle")}</span>` +
    `<span class="q-text${q.done ? " done" : ""}">${label} · ${Math.min(q.prog,q.target)}/${q.target}${q.done ? " ✓" : ""}</span>`;
}

// --- Gag: l'emoji dell'azione svolazza via (densità "brulicante") ---
function gagPop(cell){
  const seg=[...tAction(cell.inh).trim()];
  let em=seg[seg.length-1];
  if(em==="\uFE0F" && seg.length>=2) em=seg[seg.length-2]+em;   // emoji + selettore di variante
  if(!em) return;
  const rect=cell.el.getBoundingClientRect();
  const s=document.createElement("div"); s.className="gag"; s.textContent=em;
  s.style.left=(rect.left+rect.width/2-9)+"px"; s.style.top=(rect.top+rect.height*0.28)+"px";
  document.body.appendChild(s); setTimeout(()=>s.remove(), 900);
}

// --- Sfida a tempo: disattivata (la UI del timer è stata rimossa) ---
const timerEl = document.getElementById("timer");        // non più presente
const timerFill = timerEl ? timerEl.querySelector(".tf") : null;
let floorTimeout = null, floorDur = 0;
function startFloorTimer(total){
  clearTimeout(floorTimeout);
  if(!State.challenge) return;
  floorDur = 4500 + total*250;
  State.floorStart = performance.now();
  timerFill.classList.remove("expired");
  timerFill.style.transition = "none"; timerFill.style.width = "100%";
  void timerFill.offsetWidth;
  timerFill.style.transition = "width " + floorDur + "ms linear"; timerFill.style.width = "0%";
  floorTimeout = setTimeout(()=>{ timerFill.classList.add("expired"); }, floorDur);
}
function awardSpeed(rect){
  if(!State.challenge || !State.floorStart) return;
  clearTimeout(floorTimeout);
  const elapsed = performance.now() - State.floorStart; State.floorStart = 0;
  timerFill.style.transition = "none";    // congela la barra
  if(elapsed < floorDur){
    const bonus = Math.round((1 - elapsed/floorDur) * 30);
    if(bonus>0){ addCoins(bonus, rect.left+rect.width/2, rect.top-20); toast(T("fast").replace("%c", bonus+" 🪙"), 1100); }
  }
}

const cityEl = document.getElementById("citymap");
function openCity(){
  renderCity();
  cityEl.classList.remove("hidden");
  if(!tutSeen("city")) showTutorial("city", null);
}
function closeCity(){ cityEl.classList.add("hidden"); }
function renderCity(){
  document.querySelector("#citymap .city-title").textContent = T("cityTitle");
  const wrap = document.querySelector("#citymap .city-zones"); wrap.innerHTML = "";
  ZONES.forEach(z=>{
    const unlocked = State.zonesUnlocked.includes(z.id);
    const btn = document.createElement("button");
    btn.className = "zonebtn" + (unlocked ? "" : " locked");
    btn.style.setProperty("--zaccent", z.accent);
    btn.innerHTML = `<span class="zico">${z.emoji}</span><span class="zname">${T("zone"+z.key)}</span>` +
                    (unlocked ? "" : `<span class="zlock">🔒 ${z.price} 🪙</span>`);
    btn.addEventListener("pointerdown",(e)=>{ e.preventDefault();
      if(State.zonesUnlocked.includes(z.id)){
        startMode("city", z.id);
      } else if(State.coins >= z.price){
        State.coins -= z.price; save("coins", State.coins);
        State.zonesUnlocked.push(z.id); save("zones", State.zonesUnlocked);
        document.querySelector("#coins .val").textContent = State.coins;
        renderCity();
      } else {
        btn.classList.add("shake"); setTimeout(()=>btn.classList.remove("shake"), 400);
      }
    }, {passive:false});
    wrap.appendChild(btn);
  });
}

// Avvia una modalità (e sblocca l'audio col primo gesto utente)
function startMode(mode, zone){
  Audio.unlock();
  document.body.classList.remove("menu");   // torna la scena di gioco
  State.mode = mode; State.zone = zone || null; State.level = 1;
  closeCity();
  document.getElementById("start").classList.add("hidden");
  newLevel();
  enterBuilding();
  startSmoke();
  if(["classic","errands","memory"].includes(mode) && !tutSeen(mode)){
    State.locked = true;
    showTutorial(mode, ()=>{ State.locked = false; });
  }
}

// Un "timbro" salvato può essere l'id di un animale OPPURE un'emoji oggetto
function buildSprite(token){
  if(!token) return "";
  const inh = POPULATION.find(p => p.id === token);
  return inh ? inh.sprite : token;   // animale -> faccia; altrimenti è già un'emoji
}
let buildClearArmed = false, buildClearTimer = null;

function resizeCells(old, n){
  const arr = new Array(n).fill(null);
  for(let i = 0; i < Math.min(old.length, n); i++) arr[i] = old[i];
  return arr;
}
function setBuildSize(c, r){
  State.build.cells = resizeCells(State.build.cells || [], c * r);
  State.build.cols = c; State.build.rows = r;
  saveBuild(); renderBuildHouse(); renderBuildPalette();
}

function saveBuild(){ save("build", State.build); }
function openBuild(){
  Audio.unlock();
  let b = State.build;
  if(!b || typeof b !== "object" || !Array.isArray(b.cells)){
    b = State.build = { cols:4, rows:4, cells:new Array(16).fill(null), wall:"#EFB94E", roof:"#C44E3D", deco:{} };
  }
  b.cols = b.cols || 4; b.rows = b.rows || 4;
  b.wall = b.wall || "#EFB94E"; b.roof = b.roof || "#C44E3D";
  if(b.cells.length !== b.cols * b.rows) b.cells = resizeCells(b.cells, b.cols * b.rows);
  if(!Array.isArray(b.garden) || b.garden.length !== 5){
    const g = new Array(5).fill(null);
    if(Array.isArray(b.garden)) b.garden.slice(0,5).forEach((v,i)=> g[i] = v || null);
    b.garden = g;
  }
  if(!b.deco || typeof b.deco !== "object") b.deco = {};
  if(!State.buildAnimal || State.buildAnimal === "erase") State.buildAnimal = POPULATION[0].id;
  document.querySelector("#build .build-title").textContent = T("buildTitle");
  document.querySelector("#build .build-clear").textContent = T("bClear");
  document.querySelector("#build .build-show").textContent  = T("bShow");
  document.querySelector("#build .build-idea").textContent  = T("bIdea");
  document.getElementById("start").classList.add("hidden");
  buildEl.classList.remove("hidden");
  setBuildTab("tiere");
  renderBuildHouse();
}
function closeBuild(){ buildEl.classList.add("hidden"); document.getElementById("start").classList.remove("hidden"); }
function setBuildTab(tab){
  State.buildTab = tab;
  // garantisci uno "stampo" valido per la scheda, così il PRIMO tocco funziona sempre
  if(tab === "tiere"){
    const ok = State.buildAnimal === "erase" || POPULATION.some(p=>p.id===State.buildAnimal);
    if(!ok) State.buildAnimal = POPULATION[0].id;
  } else if(tab === "objekte"){
    const room = ROOMS.find(r=>r.id===State.buildRoom) || ROOMS[0];
    State.buildRoom = room.id;
    const ok = State.buildAnimal === "erase" || room.objects.includes(State.buildAnimal);
    if(!ok) State.buildAnimal = room.objects[0];
  } else if(tab === "garten"){
    if(!GARDEN_OBJECTS.includes(State.buildAnimal)) State.buildAnimal = GARDEN_OBJECTS[0];
  }
  buildEl.querySelectorAll(".build-tabs button").forEach(b=> b.classList.toggle("on", b.dataset.tab === tab));
  const hints = { tiere:T("bhTiere"), objekte:T("bhObjekte"), garten:T("bhGarten"), wand:T("bhWand"), dach:T("bhDach"), deko:T("bhDeko"), groesse:T("bhGroesse") };
  const h = document.querySelector("#build .build-hint");
  h.classList.remove("idea");
  h.textContent = hints[tab] || "";
  renderBuildPalette();
  if(tab === "garten"){
    // la striscia del giardino sta sotto la casa: se la casa è grande potrebbe
    // finire fuori dallo schermo. La portiamo sempre in vista, così il tocco
    // arriva davvero sulle aiuole e non "nel vuoto".
    const gardenStrip = buildEl.querySelector(".bgarden");
    if(gardenStrip && gardenStrip.scrollIntoView){
      setTimeout(()=> gardenStrip.scrollIntoView({ behavior:"smooth", block:"end", inline:"nearest" }), 50);
    }
  }
}
/* Pulsante "Idee 💡": suggerisce qualcosa e porta alla scheda giusta. */

  const idea = pick(IDEAS);
  if(idea.room) State.buildRoom = idea.room;
  setBuildTab(idea.tab);
  const h = document.querySelector("#build .build-hint");
  h.textContent = idea.text[LANG] || idea.text.it;
  h.classList.add("idea");
  Audio.unlock(); Audio.open(659); setTimeout(()=>Audio.open(880), 90);
}
function mkSwatch(o){
  const s = document.createElement("div");
  s.className = "swatch" + (o.on ? " on" : "");
  if(o.color) s.style.background = o.color;
  if(o.label) s.textContent = o.label;
  s.addEventListener("pointerdown",(e)=>{ e.preventDefault(); o.pick(); }, {passive:false});
  return s;
}
function renderBuildPalette(){
  const pal = document.querySelector("#build .build-palette"); pal.innerHTML = "";
  const cats = document.querySelector("#build .build-cats");
  cats.innerHTML = ""; cats.classList.remove("on");
  const tab = State.buildTab;
  const eraser = ()=> mkSwatch({ label:"🧹", on:State.buildAnimal==="erase", pick:()=>{ State.buildAnimal="erase"; renderBuildPalette(); } });
  if(tab === "tiere"){
    POPULATION.forEach(inh=> pal.appendChild(mkSwatch({ label:inh.sprite, on:State.buildAnimal===inh.id, pick:()=>{ State.buildAnimal=inh.id; renderBuildPalette(); } })));
    pal.appendChild(eraser());
  } else if(tab === "objekte"){
    // riga delle stanze (categorie)
    cats.classList.add("on");
    ROOMS.forEach(room=>{
      const c = document.createElement("div");
      c.className = "cat" + (State.buildRoom===room.id ? " on" : "");
      c.textContent = room.icon;
      c.addEventListener("pointerdown",(e)=>{ e.preventDefault();
        State.buildRoom = room.id;
        if(State.buildAnimal !== "erase" && !room.objects.includes(State.buildAnimal)) State.buildAnimal = room.objects[0];
        renderBuildPalette();
      }, {passive:false});
      cats.appendChild(c);
    });
    const room = ROOMS.find(r=>r.id===State.buildRoom) || ROOMS[0];
    room.objects.forEach(emo=> pal.appendChild(mkSwatch({ label:emo, on:State.buildAnimal===emo, pick:()=>{ State.buildAnimal=emo; renderBuildPalette(); } })));
    pal.appendChild(eraser());
  } else if(tab === "garten"){
    GARDEN_OBJECTS.forEach(emo=> pal.appendChild(mkSwatch({ label:emo, on:State.buildAnimal===emo, pick:()=>{ State.buildAnimal=emo; renderBuildPalette(); } })));
    pal.appendChild(eraser());
  } else if(tab === "wand"){
    WALLS.forEach(c=> pal.appendChild(mkSwatch({ color:c, on:State.build.wall===c, pick:()=>{ State.build.wall=c; saveBuild(); renderBuildHouse(); renderBuildPalette(); } })));
  } else if(tab === "dach"){
    ROOFS.forEach(c=> pal.appendChild(mkSwatch({ color:c, on:State.build.roof===c, pick:()=>{ State.build.roof=c; saveBuild(); renderBuildHouse(); renderBuildPalette(); } })));
  } else if(tab === "deko"){
    BDECOS.forEach(([k,emo])=> pal.appendChild(mkSwatch({ label:emo, on:!!State.build.deco[k], pick:()=>{ State.build.deco[k]=!State.build.deco[k]; saveBuild(); renderBuildHouse(); renderBuildPalette(); } })));
  } else if(tab === "groesse"){
    SIZES.forEach(sz=> pal.appendChild(mkSwatch({ label:sz.label, on:(State.build.cols===sz.c && State.build.rows===sz.r), pick:()=>{ setBuildSize(sz.c, sz.r); } })));
  }
}
function renderBuildHouse(){
  const house = document.querySelector("#build .bhouse");
  house.style.setProperty("--bwall", State.build.wall);
  house.style.setProperty("--broof", State.build.roof);
  house.style.setProperty("--bcols", State.build.cols || 4);
  const d = State.build.deco;
  house.querySelector(".broof .bflag").style.display = d.flag ? "block" : "none";
  house.querySelector(".broof .bcat").style.display  = d.cat  ? "block" : "none";
  house.classList.toggle("flowers", !!d.flowers);
  house.querySelector(".bflowers").textContent = d.flowers ? "🌷 🌼 🌸 🌻" : "";
  buildEl.querySelector(".bballoons").classList.toggle("on", !!d.balloons);
  buildEl.querySelector(".d-tree").style.display  = d.tree  ? "block" : "none";
  buildEl.querySelector(".d-sun").style.display   = d.sun   ? "block" : "none";
  buildEl.querySelector(".d-smoke").style.display = d.smoke ? "block" : "none";
  buildEl.querySelector(".d-bird").style.display  = d.bird  ? "block" : "none";
  const grid = house.querySelector(".bgrid"); grid.innerHTML = "";
  State.build.cells.forEach((id, i)=>{
    const sprite = buildSprite(id);
    const cell = document.createElement("div");
    cell.className = "bcell" + (sprite ? " has" : "");
    cell.textContent = sprite;
    cell.addEventListener("pointerdown",(e)=>{ e.preventDefault();
      if(State.buildTab !== "tiere" && State.buildTab !== "objekte") return;
      if(State.buildAnimal === "erase") State.build.cells[i] = null;
      else if(State.buildAnimal) State.build.cells[i] = State.buildAnimal;
      else return;
      saveBuild();
      const sp = buildSprite(State.build.cells[i]);
      cell.className = "bcell" + (sp ? " has" : ""); cell.textContent = sp;
      const inh = POPULATION.find(p=>p.id===State.build.cells[i]);
      Audio.open(inh ? inh.audioPitch : 523);
    }, {passive:false});
    grid.appendChild(cell);
  });

  // striscia giardino sotto la casa
  if(!Array.isArray(State.build.garden) || State.build.garden.length !== 5){
    const g = new Array(5).fill(null);
    if(Array.isArray(State.build.garden)) State.build.garden.slice(0,5).forEach((v,i)=> g[i] = v || null);
    State.build.garden = g;
  }
  const gard = buildEl.querySelector(".bgarden"); gard.innerHTML = "";
  State.build.garden.forEach((emo)=>{
    const slot = document.createElement("div");
    slot.className = "bgcell";
    slot.textContent = emo || "";
    gard.appendChild(slot);
  });
  // Un SOLO listener su tutta la striscia (invece di uno per aiuola): più affidabile
  // su iOS Safari, dove il tocco su una singola cella flex minuscola può non
  // "agganciare" bene l'elemento giusto. Calcoliamo l'aiuola dalla posizione X.
  if(!gard.dataset.wired){
    gard.dataset.wired = "1";
    let lastGardenTap = 0;   // evita doppio piazzamento se più eventi scattano sullo stesso tocco
    const plantAt = (clientX, ev)=>{
      const now = Date.now();
      if(now - lastGardenTap < 350) return;
      lastGardenTap = now;
      if(ev && ev.cancelable) ev.preventDefault();
      if(State.buildTab !== "garten") return;
      const rect = gard.getBoundingClientRect();
      if(rect.width <= 0) return;
      let idx = Math.floor(((clientX - rect.left) / rect.width) * 5);
      idx = Math.max(0, Math.min(4, idx));
      const cells = gard.children;
      if(!cells[idx]) return;
      if(State.buildAnimal === "erase"){
        State.build.garden[idx] = null; saveBuild(); cells[idx].textContent = ""; Audio.open(330); return;
      }
      const chosen = State.buildAnimal;
      const plant = GARDEN_OBJECTS.includes(chosen) ? chosen : GARDEN_OBJECTS[0];  // a prova di errore
      State.buildAnimal = plant;
      State.build.garden[idx] = plant; saveBuild(); cells[idx].textContent = plant; Audio.open(587);
    };
    gard.addEventListener("pointerdown", (e)=> plantAt(e.clientX, e), {passive:false});
    gard.addEventListener("click", (e)=> plantAt(e.clientX, e), {passive:false});
    gard.addEventListener("touchstart", (e)=>{
      const t = e.changedTouches && e.changedTouches[0];
      if(t) plantAt(t.clientX, e);
    }, {passive:false});
  }
}
const galleryEl = document.getElementById("gallery");
function saveToGallery(){
  const snap = JSON.parse(JSON.stringify(State.build));   // copia profonda
  State.gallery.unshift(snap);
  if(State.gallery.length > 12) State.gallery.length = 12;
  save("gallery", State.gallery);
}
function miniHouse(b){
  const w = document.createElement("div"); w.className = "mini-house";
  w.style.background = b.wall || "#EFB94E";
  w.style.setProperty("--mc", b.cols || 4);
  const roof = document.createElement("div"); roof.className = "mini-roof";
  roof.style.background = b.roof || "#C44E3D"; w.appendChild(roof);
  const g = document.createElement("div"); g.className = "mini-grid";
  (b.cells || []).forEach(id=>{
    const sprite = buildSprite(id);
    const c = document.createElement("div"); c.className = "mini-cell" + (sprite ? " has" : "");
    c.textContent = sprite; g.appendChild(c);
  });
  w.appendChild(g);
  // mini striscia giardino (se presente)
  if(Array.isArray(b.garden) && b.garden.some(x=>x)){
    const mg = document.createElement("div"); mg.className = "mini-garden";
    b.garden.forEach(emo=>{ const c = document.createElement("div"); c.className = "mini-gcell"; c.textContent = emo || ""; mg.appendChild(c); });
    w.appendChild(mg);
  }
  return w;
}
function renderGallery(){
  document.querySelector("#gallery .gallery-title").textContent = T("galleryTitle");
  const grid = document.querySelector("#gallery .gallery-grid"); grid.innerHTML = "";
  if(!State.gallery.length){
    const e = document.createElement("div"); e.className = "gallery-empty"; e.textContent = T("galleryEmpty");
    grid.appendChild(e); return;
  }
  State.gallery.forEach((b, idx)=>{
    const card = document.createElement("div"); card.className = "gcard";
    card.appendChild(miniHouse(b));
    const del = document.createElement("button"); del.className = "gdel"; del.textContent = "✕";
    del.addEventListener("pointerdown",(e)=>{ e.preventDefault(); e.stopPropagation();
      State.gallery.splice(idx, 1); save("gallery", State.gallery); renderGallery();
    }, {passive:false});
    card.appendChild(del);
    card.addEventListener("pointerdown",(e)=>{ e.preventDefault();
      State.build = JSON.parse(JSON.stringify(b)); saveBuild();
      closeGallery(); renderBuildHouse();
    }, {passive:false});
    grid.appendChild(card);
  });
}
function openGallery(){ renderGallery(); galleryEl.classList.remove("hidden"); }
function closeGallery(){ galleryEl.classList.add("hidden"); }

/* Collina di Berat: case bianche terrazzate con tetti rossi e tante finestrelle,
   generate proceduralmente in SVG — lo sfondo della "città delle mille finestre". */
function buildBerat(){
  const W = 1000, H = 600;
  const rnd = (a,b)=> a + Math.random()*(b-a);
  const terraces = [
    { baseY:600, hr:[70,110], wr:[52,84], wall:"#F1E7D6", roof:"#C0563E", win:"#6E4A2F" }, // vicine
    { baseY:512, hr:[58,92],  wr:[44,70], wall:"#E7DCC9", roof:"#B14E39", win:"#7A5436" },
    { baseY:430, hr:[48,76],  wr:[38,60], wall:"#DBD1BF", roof:"#A6492F", win:"#8A6244" }, // lontane (più chiare)
  ];
  let s = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">`;
  s += `<path d="M0,${H} L0,360 Q260,300 520,340 T1000,320 L1000,${H} Z" fill="rgba(150,170,120,.18)"/>`;
  terraces.forEach(t=>{
    let x = -30;
    while(x < W+30){
      const w = rnd(t.wr[0], t.wr[1]);
      const cx = x + w/2;
      const edge = Math.min(1, Math.abs(cx - W/2)/(W*0.5));   // 0 al centro, 1 ai bordi
      const h = rnd(t.hr[0], t.hr[1]) * (0.78 + 0.32*edge);
      const y = t.baseY - h - rnd(0,26)*(0.3 + 0.9*edge);     // ai lati le case salgono (anfiteatro)
      s += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${t.wall}" stroke="rgba(110,67,39,.16)" stroke-width="1"/>`;
      const ov = 7, rh = Math.min(22, h*0.30);               // tetto rosso sporgente
      s += `<polygon points="${(x-ov).toFixed(1)},${y.toFixed(1)} ${(x+w+ov).toFixed(1)},${y.toFixed(1)} ${(x+w-3).toFixed(1)},${(y-rh).toFixed(1)} ${(x+3).toFixed(1)},${(y-rh).toFixed(1)}" fill="${t.roof}"/>`;
      // tante finestrelle: la firma di Berat
      const pad=7, ww=7, wh=9, gx=6, gy=8;
      const cols = Math.max(2, Math.floor((w - pad*2 + gx)/(ww+gx)));
      const rows = Math.max(2, Math.floor((h - pad*2 + gy)/(wh+gy)));
      const usedW = cols*ww + (cols-1)*gx, usedH = rows*wh + (rows-1)*gy;
      const ox = x + (w-usedW)/2, oy = y + (h-usedH)/2 + 2;
      for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
        s += `<rect x="${(ox+c*(ww+gx)).toFixed(1)}" y="${(oy+r*(wh+gy)).toFixed(1)}" width="${ww}" height="${wh}" rx="1.5" fill="${t.win}" opacity="0.85"/>`;
      }
      x += w + rnd(2,9);
    }
  });
  s += `</svg>`;
  document.getElementById("berat").innerHTML = s;
}

};

function showTutorial(m, onClose){
