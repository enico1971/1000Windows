<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#8FD4E8" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="1000 Finestre" />
<meta name="mobile-web-app-capable" content="yes" />
<title>1000 Finestre</title>
<style>
  /* =========================================================
     1000 FINESTRE — Sistema di Design (token)
     Soggetto: il palazzo brulicante alla Richard Scarry.
     Palette storybook satura (niente cream + serif default).
     ========================================================= */
  :root{
    --sky-top:#7FCBE4;
    --sky-bot:#BDEBF6;
    --ground-1:#A9D98C;    /* prato (cambia con l'ora del giorno) */
    --ground-2:#8FCB72;
    --bldg:#EFB94E;        /* marigold facciata */
    --bldg-dark:#D89B2C;
    --roof:#C44E3D;        /* mattone */
    --roof-dark:#A33A2C;
    --trim:#6E4327;        /* legno scuro */
    --ink:#3A2920;         /* testo bruno */
    --gold:#F4C430;        /* monete */
    --cream:#FFF6E3;       /* interno illuminato della stanza */
    --good:#5BB85F;
    --bad:#E07A4A;
    --shadow:rgba(58,41,32,.28);
    --font: "Arial Rounded MT Bold","Baloo 2","Trebuchet MS",system-ui,-apple-system,sans-serif;

    /* --- Budget di spazio verticale (calcolo viewport) ---
       Riserviamo lo spazio per HUD + cartellino bersaglio + safe-area.
       Tutto il resto è altezza disponibile per il palazzo: così le
       griglie dense (5x6) si rimpiccioliscono invece di sforare. */
    --reserve-top: calc(env(safe-area-inset-top, 0px) + 130px);
    --reserve-bot: calc(env(safe-area-inset-bottom, 0px) + 46px); /* +spazio per la barra "1000 finestre" */
    --avail-h: calc(100svh - var(--reserve-top) - var(--reserve-bot));
    --bldg-budget-w: min(94vw, 440px);
  }

  /* Proprietà colore registrate: permettono al gradiente del cielo di
     transitare dolcemente da un'ora del giorno all'altra mentre si sale. */
  @property --sky-top{syntax:"<color>";inherits:true;initial-value:#7FCBE4;}
  @property --sky-bot{syntax:"<color>";inherits:true;initial-value:#BDEBF6;}
  @property --ground-1{syntax:"<color>";inherits:true;initial-value:#A9D98C;}
  @property --ground-2{syntax:"<color>";inherits:true;initial-value:#8FCB72;}

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overscroll-behavior:none;} /* niente "rimbalzo" pagina iOS */
  body{
    font-family:var(--font);
    color:var(--ink);
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bot) 62%,var(--ground-1) 62%,var(--ground-2) 100%);
    transition:--sky-top 1.1s ease,--sky-bot 1.1s ease,--ground-1 1.1s ease,--ground-2 1.1s ease;
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
  }

  /* Nuvolette ambientali */
  .cloud{position:fixed;background:#fff;border-radius:50%;opacity:.85;pointer-events:none;filter:blur(.3px);}
  .cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%;}
  #c1{width:90px;height:34px;top:8%;left:-120px;animation:drift 38s linear infinite;}
  #c1::before{width:46px;height:46px;top:-22px;left:14px;}
  #c1::after{width:34px;height:34px;top:-14px;left:48px;}
  #c2{width:70px;height:26px;top:18%;left:-120px;animation:drift 52s linear infinite;animation-delay:-20s;}
  #c2::before{width:36px;height:36px;top:-18px;left:10px;}
  #c2::after{width:26px;height:26px;top:-10px;left:38px;}
  @keyframes drift{from{transform:translateX(0)}to{transform:translateX(115vw)}}
  .cloud{transition:opacity 1.1s ease;}
  body.night .cloud{opacity:.22;}

  /* Cielo notturno: campo stellato + luna, sfumano dentro di notte */
  #stars{
    position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 1.2s ease;
    background-image:
      radial-gradient(1.6px 1.6px at 12% 22%, #fff, transparent),
      radial-gradient(1.4px 1.4px at 28% 12%, #fff, transparent),
      radial-gradient(1.8px 1.8px at 44% 28%, #fff, transparent),
      radial-gradient(1.3px 1.3px at 58% 9%,  #fff, transparent),
      radial-gradient(1.7px 1.7px at 71% 24%, #fff, transparent),
      radial-gradient(1.4px 1.4px at 83% 14%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 92% 30%, #fff, transparent),
      radial-gradient(1.3px 1.3px at 36% 6%,  #fff, transparent),
      radial-gradient(1.6px 1.6px at 64% 33%, #fff, transparent),
      radial-gradient(1.4px 1.4px at 8% 35%,  #fff, transparent);
  }
  #moon{
    position:fixed;top:9%;left:14%;width:46px;height:46px;border-radius:50%;z-index:0;
    background:radial-gradient(circle at 36% 34%, #FFF7D6, #EFE3A8);
    box-shadow:0 0 22px rgba(255,247,214,.55);
    opacity:0;transition:opacity 1.2s ease;pointer-events:none;
  }
  body.night #stars,body.night #moon{opacity:.9;}

  /* ===================== HUD ===================== */
  #hud{
    position:fixed;top:0;left:0;right:0;z-index:30;
    padding:max(10px,env(safe-area-inset-top)) 12px 8px;
    display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
    pointer-events:none;
  }
  .badge{
    background:var(--cream);border:3px solid var(--trim);border-radius:16px;
    box-shadow:0 4px 0 var(--shadow);padding:7px 13px;display:flex;align-items:center;gap:7px;
    font-size:18px;line-height:1;white-space:nowrap;transition:transform .16s;
  }
  .badge .ic{font-size:20px;}
  #coins .val{color:#B8860B;min-width:1ch;}
  #floor .val{color:var(--roof);}
  .hud-right{display:flex;align-items:flex-start;gap:8px;pointer-events:auto;}
  .btn{font-family:var(--font);color:var(--ink);cursor:pointer;pointer-events:auto;}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shadow);}
  #mute{padding:7px 11px;}
  #mute .ic{font-size:19px;}

  /* Cartellino bersaglio: il cuore dell'ingaggio */
  #target{
    position:fixed;top:calc(max(10px,env(safe-area-inset-top)) + 52px);left:50%;
    transform:translateX(-50%);z-index:30;pointer-events:none;
    background:var(--cream);border:3px solid var(--trim);border-radius:20px;
    box-shadow:0 5px 0 var(--shadow);
    padding:8px 18px 9px;text-align:center;min-width:200px;
    animation:pulseTarget 1.6s ease-in-out infinite;
  }
  @keyframes pulseTarget{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.035)}}
  #target .lbl{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--bad);}
  #target .who{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:2px;}
  #target .who .face{font-size:30px;line-height:1;animation:bob 1.1s ease-in-out infinite;}
  #target .who .nm{font-size:18px;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

  /* Striscia streak */
  #streak{position:fixed;top:calc(max(10px,env(safe-area-inset-top)) + 4px);left:50%;transform:translateX(-50%);
    z-index:29;font-size:13px;color:#fff;text-shadow:0 2px 0 var(--shadow);opacity:0;transition:opacity .3s;}

  /* ===================== PALAZZO ===================== */
  /* Lo stage centra il palazzo NELLO spazio rimasto sotto l'HUD,
     grazie al padding pari alle riserve: niente collisioni in alto. */
  #stage{
    position:fixed;inset:0;z-index:10;
    display:flex;align-items:center;justify-content:center;
    padding:var(--reserve-top) 8px var(--reserve-bot);
  }
  #building{
    width:fit-content;max-width:var(--bldg-budget-w);max-height:100%;
    display:flex;flex-direction:column;position:relative;
    filter:drop-shadow(0 12px 14px var(--shadow));
    transform-origin:center bottom;
    transition:none; /* le transizioni "ascensore" sono gestite dalle classi sotto */
  }
  #building.celebrate{animation:wobble .6s ease;}
  @keyframes wobble{0%{transform:rotate(0)}20%{transform:rotate(-1.3deg) translateY(-4px)}45%{transform:rotate(1.1deg)}70%{transform:rotate(-.6deg)}100%{transform:rotate(0)}}

  /* --- Effetto ascensore (transizioni JS-coordinate) --- */
  #building.lift-out  {transition:transform .32s cubic-bezier(.5,0,.75,.3);transform:translateY(120svh);}   /* il piano esce in basso */
  #building.lift-above{transition:none;transform:translateY(-120svh);}                                       /* nuovo piano posizionato sopra */
  #building.lift-in   {transition:transform .5s cubic-bezier(.22,1.25,.4,1);transform:translateY(0);}        /* rientro elastico dall'alto */

  .roof{
    position:relative;
    height:34px;margin:0 -6px;
    background:linear-gradient(180deg,var(--roof),var(--roof-dark));
    border-radius:14px 14px 4px 4px;border:3px solid var(--trim);border-bottom:none;
  }
  /* Comignolo reale (ancora per le particelle di fumo) */
  .chimney{
    position:absolute;right:20%;top:-20px;width:16px;height:22px;
    background:var(--trim);border-radius:4px 4px 0 0;box-shadow:6px 0 0 var(--trim);
  }
  /* Fumo: cerchietti grigi che fluttuano in alto svanendo */
  .smoke-puff{
    position:absolute;left:50%;bottom:100%;
    width:12px;height:12px;border-radius:50%;
    background:rgba(190,190,190,.5);
    transform:translateX(-50%);pointer-events:none;
    animation:smokeRise 2.6s ease-out forwards;
  }
  @keyframes smokeRise{
    0%{opacity:0;transform:translate(-50%,4px) scale(.5);}
    18%{opacity:.5;}
    100%{opacity:0;transform:translate(calc(-50% + 11px),-48px) scale(2.2);}
  }

  .facade{
    background:
      repeating-linear-gradient(180deg,transparent 0 38px,rgba(110,67,39,.06) 38px 40px),
      linear-gradient(180deg,var(--bldg),var(--bldg-dark));
    border:3px solid var(--trim);border-radius:6px 6px 16px 16px;
    padding:16px 14px 14px;
  }

  /* --- Griglia responsiva: la cella è il MIN tra il limite di
     larghezza e quello di altezza, così il palazzo resta sempre
     intero nel viewport (safe-area inclusa) senza scrollbar. --- */
  #grid{
    --cols:3;--rows:3;--gap:10px;
    --grid-w: calc(var(--bldg-budget-w) - 46px);   /* meno bordi/padding facciata + sporgenza tetto */
    --grid-h: calc(var(--avail-h) - 73px);          /* meno tetto + bordi/padding facciata */
    --cellW: calc((var(--grid-w) - (var(--cols) - 1) * var(--gap)) / var(--cols));
    --cellH: calc((var(--grid-h) - (var(--rows) - 1) * var(--gap)) / var(--rows));
    --cell:  max(30px, min(var(--cellW), var(--cellH)));
    display:grid;
    grid-template-columns:repeat(var(--cols), var(--cell));
    grid-auto-rows:var(--cell);
    gap:var(--gap);
    justify-content:center;
  }

  /* ---------- Finestra (elemento-firma) ---------- */
  .win{
    position:relative;width:var(--cell);height:var(--cell);aspect-ratio:1/1;border-radius:10px;
    background:var(--cream);                 /* stanza illuminata dietro le persiane */
    border:3px solid var(--trim);
    overflow:hidden;cursor:pointer;
    box-shadow:inset 0 -6px 0 rgba(110,67,39,.12);
    perspective:640px;
    transition:transform .12s ease;
  }
  .win:active{transform:scale(.97);}
  .win .room{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .win .inh{
    width:calc(var(--cell) * .64);height:calc(var(--cell) * .64);
    display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--cell) * .5);line-height:1;transform:scale(.4);opacity:0;
    transition:transform .2s,opacity .2s;
  }
  /* sprite: emoji, immagine singola o cella di sprite-sheet (pixel-art nitida) */
  .sprite-emoji{font-size:inherit;line-height:1;}
  .sprite{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;}
  .sprite.sheet{
    background-image:var(--sheet-src);
    background-repeat:no-repeat;
    background-size:calc(var(--sheet-cols,4) * 100%) calc(var(--sheet-rows,4) * 100%);
  }
  .win.open .inh{transform:scale(1) translateY(calc(var(--cell) * .05));opacity:1;animation:idleBob 1s ease-in-out infinite;}
  @keyframes idleBob{
    0%,100%{transform:scale(1) translateY(calc(var(--cell) * .05));}
    50%{transform:scale(1.04) translateY(calc(var(--cell) * .05 - 2px));}
  }

  /* fumetto azione (rivelazione sbagliata) */
  .win .speech{
    position:absolute;left:50%;bottom:5px;transform:translateX(-50%) translateY(6px);
    background:#fff;border:2px solid var(--trim);border-radius:8px;
    font-size:12px;line-height:1.15;padding:3px 6px;max-width:94%;text-align:center;
    opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;
  }
  .win.open.wrong .speech{opacity:1;transform:translateX(-50%) translateY(0);}
  .win .speech:empty{display:none;}   /* niente fumetto vuoto (Klassik/Stadt: solo simbolo) */

  /* Persiane: due ante che si spalancano con rimbalzo elastico.
     Texture "stecche di legno": gradiente verticale per la rotondità +
     repeating-linear-gradient orizzontale (stecca chiara + corpo + solco scuro)
     così restano tridimensionali e leggibili anche in pieno sole. */
  .shutter{
    position:absolute;top:0;bottom:0;width:50%;z-index:2;
    background:
      linear-gradient(90deg, rgba(0,0,0,.20) 0%, rgba(0,0,0,0) 16%, rgba(255,255,255,.30) 52%, rgba(0,0,0,.14) 100%),
      repeating-linear-gradient(180deg,
        rgba(255,255,255,.22) 0 1px,
        var(--sh) 1px 5px,
        var(--sh-d) 5px 6px,
        rgba(0,0,0,.20) 6px 7px);
    border:2px solid rgba(110,67,39,.55);
    transition:transform .52s cubic-bezier(.34,1.56,.64,1);
    backface-visibility:hidden;
  }
  .shutter::after{content:"";position:absolute;top:50%;width:7px;height:7px;border-radius:50%;
    background:var(--gold);box-shadow:0 0 0 2px rgba(110,67,39,.6);transform:translateY(-50%);}
  .shutter.l{left:0;transform-origin:left center;border-radius:8px 0 0 8px;}
  .shutter.l::after{right:4px;}
  .shutter.r{right:0;transform-origin:right center;border-radius:0 8px 8px 0;}
  .shutter.r::after{left:4px;}
  .win.open .shutter.l{transform:rotateY(-118deg);}
  .win.open .shutter.r{transform:rotateY(118deg);}
  .win.solved{animation:solvedPop .5s ease;box-shadow:0 0 0 4px var(--good),inset 0 -6px 0 rgba(110,67,39,.12);}
  @keyframes solvedPop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}

  /* monetina volante */
  .coinfly{position:fixed;z-index:40;font-size:22px;pointer-events:none;
    animation:coinUp .9s ease forwards;}
  @keyframes coinUp{0%{opacity:0;transform:translateY(0) scale(.5)}15%{opacity:1}100%{opacity:0;transform:translateY(-90px) scale(1.3)}}

  /* confetti canvas */
  #fx{position:fixed;inset:0;z-index:50;pointer-events:none;}

  /* ===== Barra obiettivo "1000 finestre" (progresso a lungo termine) ===== */
  #progress{
    position:fixed;left:0;right:0;bottom:0;z-index:20;pointer-events:none;
    padding:0 12px calc(env(safe-area-inset-bottom,0px) + 6px);
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  #progress .lbl{font-size:11px;color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.55);}
  #progress .track{
    width:min(92vw,420px);height:12px;background:rgba(255,246,227,.88);
    border:2px solid var(--trim);border-radius:8px;overflow:hidden;box-shadow:0 3px 0 var(--shadow);
  }
  #progress .fill{
    height:100%;width:0;border-radius:6px;
    background:linear-gradient(90deg,var(--gold),#E8A24C);
    transition:width .45s cubic-bezier(.22,1,.36,1);
  }
  /* lampo della barra ogni 100 finestre */
  #progress .track.flash{animation:trackFlash .5s ease;}
  @keyframes trackFlash{
    0%,100%{box-shadow:0 3px 0 var(--shadow);transform:scale(1);}
    50%{box-shadow:0 0 0 3px var(--gold),0 3px 0 var(--shadow);transform:scale(1.05);}
  }

  /* Toast del traguardo (1000 finestre raggiunte) */
  #milestone{
    position:fixed;top:38%;left:50%;transform:translate(-50%,-10px);z-index:55;
    background:var(--cream);border:3px solid var(--trim);border-radius:16px;
    padding:12px 18px;font-size:17px;text-align:center;max-width:80vw;line-height:1.2;
    box-shadow:0 6px 0 var(--shadow);opacity:0;pointer-events:none;
    transition:opacity .3s,transform .3s;
  }
  #milestone.show{opacity:1;transform:translate(-50%,0);}

  /* ===================== START SCREEN ===================== */
  #start{
    position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-start;gap:14px;text-align:center;
    padding-top:max(0px,env(safe-area-inset-top));background:none;
  }
  /* In modalità menu: solo cielo + collina di Berat dietro le opzioni */
  body.menu #stage,body.menu #hud,body.menu #progress,
  body.menu #target,body.menu #streak,body.menu #timer{display:none!important;}
  #start h1{text-shadow:0 3px 0 rgba(58,41,32,.25),0 0 18px rgba(255,255,255,.4);}
  .menu-panel{
    display:flex;flex-direction:column;gap:10px;align-items:stretch;
    width:min(88vw,340px);padding:16px;border-radius:22px;
    background:rgba(255,246,227,.84);border:3px solid var(--trim);
    box-shadow:0 8px 0 var(--shadow);
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  }
  .menu-panel #modes{width:auto;margin-top:0;}
  #questBanner{display:flex;flex-direction:column;gap:1px;background:#FFF6E3;border:2px dashed var(--trim);
    border-radius:12px;padding:7px 10px;margin-bottom:2px;text-align:left;}
  #questBanner .q-title{font-size:12px;color:#B8860B;font-weight:bold;}
  #questBanner .q-text{font-size:13px;color:var(--ink);}
  #questBanner .q-text.done{color:var(--good);font-weight:bold;}
  /* Foto reale di Berat come sfondo del menu */

  .menu-page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;}
  #welcomeMsg{font-size:22px;color:#fff;background:rgba(58,41,32,.45);
    padding:7px 18px;border-radius:16px;text-shadow:0 1px 2px rgba(0,0,0,.45);
    backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
  #toModesBtn{width:min(72vw,260px);text-align:center;
    background:linear-gradient(180deg,#E8A24C,#C8862E);}
  .page-back{position:absolute;top:calc(max(10px,env(safe-area-inset-top)) + 8px);left:14px;
    font-family:var(--font);font-size:20px;color:var(--ink);background:rgba(255,246,227,.92);
    border:3px solid var(--trim);border-radius:12px;width:42px;height:38px;cursor:pointer;z-index:2;}
  /* la collina disegnata non si vede durante il gioco (sfondo pulito) */
  #berat{display:none;}
  #start h1{
    font-size:clamp(40px,15vw,78px);margin:0;color:var(--cream);
    text-shadow:0 4px 0 var(--roof),0 8px 14px var(--shadow);letter-spacing:1px;line-height:.92;
  }
  #start h1 small{display:block;font-size:.38em;letter-spacing:6px;color:#fff;margin-top:8px;}
  #start p{color:var(--ink);background:var(--cream);border:3px solid var(--trim);
    border-radius:14px;padding:8px 16px;font-size:15px;max-width:300px;box-shadow:0 4px 0 var(--shadow);}
  #playBtn{
    margin-top:14px;font-family:var(--font);font-size:24px;color:#fff;
    background:linear-gradient(180deg,var(--good),#4a9c4f);
    border:3px solid var(--trim);border-radius:18px;padding:14px 38px;
    box-shadow:0 6px 0 var(--shadow);cursor:pointer;animation:bob 1s ease-in-out infinite;
  }
  #playBtn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow);}
  #start .reset{
    margin-top:6px;background:none;border:none;color:var(--cream);
    font-family:var(--font);font-size:13px;opacity:.85;text-decoration:underline;
    cursor:pointer;text-shadow:0 1px 2px var(--shadow);
  }
  #start .reset:active{opacity:1;}
  #langs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:14px;}
  #langs button{
    font-family:var(--font);font-size:14px;color:var(--ink);
    background:var(--cream);border:3px solid var(--trim);border-radius:12px;
    padding:6px 12px;box-shadow:0 3px 0 var(--shadow);cursor:pointer;opacity:.7;
  }
  #langs button.active{opacity:1;background:var(--gold);}
  #langs button:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shadow);}
  .hidden{display:none!important;}

  /* ===== NEGOZIO ===== */
  #shop{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;
    background:rgba(58,41,32,.45);padding:16px;}
  .shop-card{width:min(94vw,440px);max-height:84vh;display:flex;flex-direction:column;
    background:var(--cream);border:3px solid var(--trim);border-radius:18px;
    box-shadow:0 8px 0 var(--shadow);overflow:hidden;}
  .shop-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:3px solid var(--trim);}
  .shop-title{font-size:20px;flex:1;}
  .shop-coins,.shop-stars{font-size:16px;color:#B8860B;}
  .shop-close{font-family:var(--font);font-size:18px;border:3px solid var(--trim);background:#fff;
    border-radius:10px;width:34px;height:34px;cursor:pointer;}
  .shop-body{padding:8px 14px 16px;overflow-y:auto;}
  .shop-sec{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--bad);margin:12px 0 4px;}
  .shop-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed rgba(110,67,39,.25);}
  .shop-row .nm{flex:1;font-size:15px;}
  .swatch{width:26px;height:26px;border-radius:7px;border:2px solid var(--trim);flex:none;}
  .shop-row .emoji{font-size:22px;width:26px;text-align:center;flex:none;}
  .shop-btn{font-family:var(--font);font-size:14px;color:#fff;background:var(--good);
    border:3px solid var(--trim);border-radius:10px;padding:6px 12px;cursor:pointer;
    box-shadow:0 3px 0 var(--shadow);min-width:84px;flex:none;}
  .shop-btn.owned{background:var(--gold);color:var(--ink);}
  .shop-btn.active{background:var(--bad);}
  .shop-btn.cant{background:#bbb;}
  .shop-btn[disabled]{opacity:.8;}
  .shop-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--shadow);}

  /* insegna del distretto sul tetto */
  .roof .sign{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-1.5deg);z-index:2;
    background:var(--accent,#E07A4A);color:#fff;border:2px solid var(--trim);border-radius:8px;
    padding:1px 8px;font-size:11px;white-space:nowrap;box-shadow:0 2px 0 var(--shadow);max-width:70%;overflow:hidden;text-overflow:ellipsis;}

  /* decorazioni acquistabili */
  #decor{position:absolute;inset:0;z-index:4;pointer-events:none;}
  #decor .deco{position:absolute;line-height:1;}
  #decor .deco-gatto-tetto{top:-20px;left:28%;font-size:26px;}
  #decor .deco-bandiera{top:-30px;right:23%;font-size:20px;}
  #decor .deco-palloncini{top:-24px;right:5%;font-size:24px;animation:bob 2.2s ease-in-out infinite;}
  #decor .deco-fiori{bottom:1px;left:50%;transform:translateX(-50%);font-size:12px;letter-spacing:1px;}

  /* coccinella d'oro (il "Goldbug" alla Scarry) */
  .bug{position:absolute;top:6px;right:6px;font-size:16px;z-index:3;animation:bugPop .5s ease;}
  @keyframes bugPop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.4)}100%{transform:scale(1)}}

  /* gag: l'emoji dell'azione svolazza via */
  .gag{position:fixed;z-index:45;font-size:18px;pointer-events:none;animation:gagUp .9s ease forwards;}
  @keyframes gagUp{0%{opacity:0;transform:translateY(0) scale(.6)}20%{opacity:1}
    100%{opacity:0;transform:translateY(-46px) scale(1.1) rotate(12deg)}}

  /* barra sfida a tempo */
  #timer{position:fixed;top:calc(max(10px,env(safe-area-inset-top)) + 118px);left:50%;
    transform:translateX(-50%);z-index:28;width:min(86vw,300px);height:9px;
    background:rgba(255,246,227,.85);border:2px solid var(--trim);border-radius:6px;overflow:hidden;display:none;}
  body.challenge #timer{display:block;}
  #timer .tf{height:100%;width:100%;background:linear-gradient(90deg,var(--good),var(--gold));}
  #timer .tf.expired{background:#b9b2a6;}

  /* pulsanti extra nella schermata iniziale */
  #start .shopbtn,#start .chalbtn{font-family:var(--font);font-size:15px;color:var(--ink);
    background:var(--cream);border:3px solid var(--trim);border-radius:12px;padding:8px 16px;
    box-shadow:0 4px 0 var(--shadow);cursor:pointer;margin-top:8px;}
  #start .shopbtn:active,#start .chalbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}

  /* ===== MENU MODALITÀ (start) ===== */
  #start{overflow-y:auto;}
  #modes{display:flex;flex-direction:column;gap:10px;width:min(86vw,320px);margin-top:6px;}
  .modebtn{font-family:var(--font);font-size:18px;color:#fff;
    background:linear-gradient(180deg,var(--good),#4a9c4f);
    border:3px solid var(--trim);border-radius:16px;padding:13px 16px;
    box-shadow:0 5px 0 var(--shadow);cursor:pointer;text-align:left;}
  #modeErrandsBtn{background:linear-gradient(180deg,#E8A24C,#C8862E);}
  #modeCityBtn{background:linear-gradient(180deg,#5BAEE0,#3F8FC0);}
  .modebtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--shadow);}

  /* Layout compatto a due blocchi (niente scroll): modalità + extra in griglia */
  #start:has(#modesPage:not(.hidden)){gap:8px;}
  #start:has(#modesPage:not(.hidden)) #menuPhoto{aspect-ratio:auto;height:110px;}
  #modesPage .menu-panel{padding:10px 12px;gap:6px;}
  #modesPage #questBanner{padding:5px 9px;margin-bottom:0;}
  #modesPage #questBanner .q-title{font-size:11px;}
  #modesPage #questBanner .q-text{font-size:12px;}
  #modesPage #modes{gap:6px;margin-top:0;}
  #modesPage .modebtn{font-size:14px;padding:8px 12px;border-radius:12px;box-shadow:0 3px 0 var(--shadow);}
  .menu-extras{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:auto;margin-top:2px;}
  #modesPage .menu-extras .shopbtn,#modesPage .menu-extras .chalbtn,#modesPage .menu-extras .reset{
    margin-top:0;width:100%;font-size:12px;padding:6px 5px;text-align:center;box-shadow:0 3px 0 var(--shadow);}
  #modesPage .menu-extras #resetBtn{grid-column:1 / -1;}

  /* ⭐ Pulsante "eroe" del gioco principale (Classic) */
  #modesPage .modebtn.hero{
    background:linear-gradient(180deg,#FFC24B,#F0922E);
    border:4px solid #fff;border-radius:18px;padding:11px 14px;
    box-shadow:0 6px 0 rgba(110,67,39,.30),0 8px 20px rgba(240,146,46,.45);
    display:flex;flex-direction:column;gap:1px;align-items:center;text-align:center;
    animation:heroPulse 2.2s ease-in-out infinite;
  }
  #modesPage .modebtn.hero .hero-badge{
    font-size:11px;font-weight:bold;color:#fff;letter-spacing:1.5px;
    text-shadow:0 1px 2px rgba(110,67,39,.5);}
  #modesPage .modebtn.hero .hero-label{
    font-size:19px;color:#fff;text-shadow:0 2px 0 rgba(110,67,39,.35);}
  #modesPage .modebtn.hero:active{transform:translateY(4px) scale(.99);
    box-shadow:0 2px 0 rgba(110,67,39,.30);}
  @keyframes heroPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
  @media (prefers-reduced-motion: reduce){ #modesPage .modebtn.hero{animation:none;} }

  /* modi secondari, compatti in 2 colonne */
  .modes-secondary{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;}
  #modesPage .modes-secondary .modebtn{font-size:13px;padding:9px 8px;text-align:center;line-height:1.12;}

  /* ⭐ Stelle di fine livello (sopra il palazzo) */
  .stars-pop{position:fixed;left:50%;top:24%;transform:translateX(-50%);z-index:70;
    display:flex;gap:12px;pointer-events:none;}
  .stars-pop .star{font-size:48px;opacity:0;transform:scale(.2);
    filter:drop-shadow(0 3px 4px rgba(110,67,39,.4));}
  .stars-pop .star.on{animation:starPop .55s cubic-bezier(.2,1.5,.5,1) forwards;}
  .stars-pop .star.off{animation:starPopDim .55s ease forwards;}
  @keyframes starPop{to{opacity:1;transform:scale(1);}}
  @keyframes starPopDim{to{opacity:.4;transform:scale(.9);}}
  @media (prefers-reduced-motion: reduce){
    .stars-pop .star{animation:none!important;transform:scale(1);opacity:1;}
    .stars-pop .star.off{opacity:.4;}
  }

  /* lista commissioni nel cartellino target */
  #target .errands{display:none;align-items:center;justify-content:center;gap:12px;margin-top:3px;}
  #target .errand{font-size:26px;line-height:1;opacity:.4;transition:transform .2s,opacity .2s,filter .2s;}
  #target .errand.done{opacity:1;transform:scale(1.12);position:relative;}
  #target .errand.done::after{content:"✓";position:absolute;right:-4px;bottom:-4px;font-size:13px;color:var(--good);
    text-shadow:0 0 2px #fff,0 0 2px #fff;}

  /* gruppo sinistro HUD (Home + monete) */
  .hud-left{display:flex;gap:8px;align-items:flex-start;pointer-events:auto;}

  /* nuvoletta dialogo anche in modalità Mestieri */
  .win.open.say .speech{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== MAPPA DELLA CITTÀ ===== */
  #citymap{position:fixed;inset:0;z-index:65;display:flex;align-items:center;justify-content:center;
    background:rgba(58,41,32,.5);padding:16px;}
  .city-card{width:min(94vw,440px);max-height:86vh;display:flex;flex-direction:column;
    background:var(--cream);border:3px solid var(--trim);border-radius:18px;
    box-shadow:0 8px 0 var(--shadow);overflow:hidden;}
  .city-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:3px solid var(--trim);}
  .city-title{font-size:20px;flex:1;}
  .city-back{font-family:var(--font);font-size:18px;border:3px solid var(--trim);background:#fff;
    border-radius:10px;width:38px;height:34px;cursor:pointer;}
  .city-zones{padding:14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
  .zonebtn{display:flex;align-items:center;gap:12px;font-family:var(--font);text-align:left;
    color:var(--ink);background:#fff;border:3px solid var(--trim);border-radius:14px;
    padding:14px;box-shadow:0 4px 0 var(--shadow);cursor:pointer;border-left:10px solid var(--zaccent,#5BAEE0);}
  .zonebtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}
  .zonebtn .zico{font-size:34px;}
  .zonebtn .zname{flex:1;font-size:17px;}
  .zonebtn .zlock{font-size:14px;color:#B8860B;}
  .zonebtn.locked{opacity:.85;}
  .zonebtn.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  /* ===== COLLINA DI BERAT (sfondo procedurale) ===== */
  #berat{position:fixed;left:0;right:0;bottom:0;height:46svh;z-index:5;pointer-events:none;
    transition:filter 1.1s ease,opacity 1.1s ease;}
  #berat svg{display:block;width:100%;height:100%;}
  body.night #berat{filter:brightness(.5) saturate(.85);}
  body.zone-porto #berat{filter:saturate(1.06) brightness(1.03);}        /* porto: luminoso, marino */
  body.zone-castello #berat{filter:brightness(.74) saturate(.92) hue-rotate(14deg);}  /* castello: crepuscolo */

  /* ===== TUTORIAL ===== */
  #tutorial{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;
    background:rgba(58,41,32,.5);padding:18px;}
  .tut-card{width:min(90vw,360px);background:var(--cream);border:3px solid var(--trim);border-radius:18px;
    box-shadow:0 8px 0 var(--shadow);padding:22px 20px;text-align:center;}
  .tut-emoji{font-size:46px;line-height:1;}
  .tut-title{font-size:20px;margin:6px 0 4px;}
  .tut-text{font-size:15px;line-height:1.45;color:#6a5240;margin-bottom:16px;}
  .tut-ok{font-family:var(--font);font-size:17px;color:#fff;
    background:linear-gradient(180deg,var(--good),#4a9c4f);border:3px solid var(--trim);
    border-radius:14px;padding:11px 22px;box-shadow:0 4px 0 var(--shadow);cursor:pointer;}
  .tut-ok:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}

  /* ===== Momento-Eroe (abitante trovato in primo piano) ===== */
  #hero{position:fixed;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .hero-card{display:flex;flex-direction:column;align-items:center;gap:4px;padding:30px 44px;
    background:radial-gradient(closest-side,rgba(255,246,227,.96),rgba(255,246,227,0) 78%);}
  .hero-sprite{font-size:96px;line-height:1;filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));}
  .hero-sprite img{width:112px;height:112px;}
  .hero-name{font-size:22px;color:var(--ink);text-shadow:0 1px 0 #fff;}
  .hero-job{font-size:14px;color:#7a624f;}
  /* "Quadro" del tema (Giornata dei Mestieri) */
  #themeWin{position:fixed;inset:0;z-index:55;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .theme-scene{font-size:60px;line-height:1.15;letter-spacing:4px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.22));}
  .theme-title{font-size:20px;color:var(--ink);text-shadow:0 1px 0 #fff;margin-top:6px;}
  .theme-sub{font-size:15px;color:var(--good);font-weight:bold;margin-top:1px;}
  .hero-card.pop{animation:heroPop .55s cubic-bezier(.18,1.5,.4,1);}
  @keyframes heroPop{0%{transform:scale(.2) rotate(-8deg);opacity:0;}
    55%{transform:scale(1.14) rotate(3deg);opacity:1;}100%{transform:scale(1) rotate(0);}}

  /* ===== Ospite speciale (VIP con corona) ===== */
  .win.rare-guest{box-shadow:0 0 0 3px #FFD24A, 0 0 16px 4px rgba(255,210,74,.85);}
  .win .crown{position:absolute;top:2px;right:3px;font-size:15px;z-index:3;
    animation:rareCrown 1s ease-in-out infinite;}
  @keyframes rareCrown{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-3px) rotate(6deg);}}

  /* ===== Palloncini dei traguardi ===== */
  .balloon{position:fixed;bottom:-60px;z-index:52;pointer-events:none;
    animation:balloonRise linear forwards;will-change:transform,opacity;}
  @keyframes balloonRise{0%{transform:translateY(0) translateX(0);opacity:0;}
    12%{opacity:1;}100%{transform:translateY(-118vh) translateX(var(--sway,0));opacity:1;}}

  /* ===== Album degli abitanti (collezione) ===== */
  #album{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;background:rgba(58,41,32,.5);padding:16px;}
  .album-card{width:min(94vw,460px);max-height:86vh;display:flex;flex-direction:column;background:var(--cream);border:3px solid var(--trim);border-radius:18px;box-shadow:0 8px 0 var(--shadow);overflow:hidden;}
  .album-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:3px solid var(--trim);}
  .album-title{font-size:20px;flex:1;}
  .album-count{font-size:15px;color:#B8860B;font-weight:bold;}
  .album-close{font-family:var(--font);font-size:18px;border:3px solid var(--trim);background:#fff;border-radius:10px;width:34px;height:34px;cursor:pointer;}
  .album-grid{padding:12px 14px;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .acard{background:#fff;border:3px solid var(--trim);border-radius:12px;padding:8px 6px 7px;text-align:center;box-shadow:0 3px 0 var(--shadow);}
  .acard .aem{font-size:34px;line-height:1.1;}
  .acard .aem img{width:40px;height:40px;}
  .acard .anm{font-size:11.5px;font-weight:bold;margin-top:2px;}
  .acard .aact{font-size:9px;color:#7a624f;line-height:1.15;margin-top:1px;min-height:1.1em;}
  .acard.locked{opacity:.75;}
  .acard.locked .aem{filter:grayscale(1);opacity:.4;}
  .acard.locked .anm{color:#9a8a7a;}

  /* timbro "NUOVO!" alla prima scoperta di un abitante */
  .newstamp{position:fixed;z-index:54;pointer-events:none;font-family:var(--font);font-size:16px;color:#fff;
    background:#E0734A;border:2px solid #fff;border-radius:8px;padding:3px 9px;transform:rotate(-12deg);
    box-shadow:0 2px 6px rgba(0,0,0,.25);animation:newPop 1.1s ease forwards;}
  @keyframes newPop{0%{transform:rotate(-12deg) scale(.3);opacity:0;}25%{transform:rotate(-12deg) scale(1.1);opacity:1;}
    70%{opacity:1;}100%{transform:rotate(-12deg) scale(1) translateY(-32px);opacity:0;}}

  /* ===== BAU-MODUS (gestalte dein Haus) ===== */
  #build{position:fixed;inset:0;z-index:62;display:flex;flex-direction:column;align-items:center;
    background:linear-gradient(180deg,#BFE2EF 0%,#CFE6E9 55%,#E7F0D8 100%);
    padding:max(10px,env(safe-area-inset-top)) 10px calc(env(safe-area-inset-bottom,0px) + 8px);}
  .build-back{position:absolute;top:calc(max(10px,env(safe-area-inset-top)) + 6px);left:14px;z-index:3;
    font-family:var(--font);font-size:20px;color:var(--ink);background:rgba(255,246,227,.92);
    border:3px solid var(--trim);border-radius:12px;width:42px;height:38px;cursor:pointer;}
  .build-title{font-family:var(--font);font-size:20px;color:var(--ink);margin:4px 0 2px;text-shadow:0 1px 0 #fff;}
  .build-hint{font-family:var(--font);font-size:13px;color:#7a624f;margin:0 0 6px;min-height:16px;text-align:center;padding:0 12px;}
  .build-stage{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;width:100%;gap:0;overflow-y:auto;padding-top:6px;}
  .bhouse{--bwall:#EFB94E;--broof:#C44E3D;width:min(86vw,360px);background:var(--bwall);
    border:3px solid var(--trim);border-radius:8px;box-shadow:0 8px 0 var(--shadow);padding:12px;margin-top:24px;}
  .broof{position:relative;height:24px;margin:-30px -15px 10px;background:var(--broof);
    border:3px solid var(--trim);border-radius:10px 10px 4px 4px;}
  .broof .bflag{position:absolute;left:12px;top:-18px;font-size:20px;}
  .broof .bcat{position:absolute;right:12px;top:-22px;font-size:24px;}
  .bgrid{display:grid;grid-template-columns:repeat(var(--bcols,4),1fr);gap:8px;}
  .bcell{aspect-ratio:1/1;background:#3a2920;border:3px solid rgba(0,0,0,.18);border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.3);}
  .bcell.has{background:#FFF6E3;}
  .bflowers{display:none;justify-content:space-around;margin-top:10px;font-size:22px;}
  .bhouse.flowers .bflowers{display:flex;}
  .bballoons{position:absolute;top:0;left:0;right:0;display:none;justify-content:space-between;
    padding:0 16px;font-size:30px;pointer-events:none;}
  .bballoons.on{display:flex;}
  .build-bar{width:100%;max-width:520px;}
  .build-tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:8px;}
  .build-tabs button{font-family:var(--font);font-size:20px;width:48px;height:42px;border:3px solid var(--trim);
    background:#fff;border-radius:12px;cursor:pointer;box-shadow:0 3px 0 var(--shadow);}
  .build-tabs button.on{background:#EFB94E;}
  .build-palette{display:flex;gap:8px;overflow-x:auto;padding:7px 9px;min-height:56px;align-items:center;
    background:rgba(255,246,227,.75);border:3px solid var(--trim);border-radius:14px;}
  .swatch{flex:0 0 auto;width:46px;height:46px;border:3px solid var(--trim);border-radius:10px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:27px;background:#fff;}
  .swatch.on{outline:3px solid #E0734A;outline-offset:1px;}
  /* riga delle categorie (stanze) nella scheda Oggetti */
  .build-cats{display:none;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:7px;}
  .build-cats.on{display:flex;}
  .build-cats .cat{width:40px;height:36px;border:3px solid var(--trim);background:#fff;border-radius:10px;
    font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .build-cats .cat.on{background:#EFB94E;}
  /* striscia giardino sotto la casa */
  .bgarden{width:min(86vw,360px);height:54px;margin-top:6px;background:linear-gradient(180deg,#9FD17F,#7FBE63);
    border:3px solid var(--trim);border-radius:8px;box-shadow:0 6px 0 var(--shadow);
    display:flex;align-items:flex-end;justify-content:space-around;padding:2px 6px 4px;}
  .bgcell{flex:1;height:100%;display:flex;align-items:flex-end;justify-content:center;font-size:30px;cursor:pointer;}
  .bgcell:empty::after{content:"·";color:rgba(0,0,0,.18);font-size:20px;align-self:center;}
  .build-clear{margin:0;display:block;font-family:var(--font);font-size:15px;color:#fff;
    background:#C0563E;border:3px solid var(--trim);border-radius:12px;padding:8px 16px;cursor:pointer;box-shadow:0 4px 0 var(--shadow);}
  .build-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:8px;}
  .build-show{font-family:var(--font);font-size:15px;color:#fff;background:#5AA469;border:3px solid var(--trim);
    border-radius:12px;padding:8px 16px;cursor:pointer;box-shadow:0 4px 0 var(--shadow);}
  .build-idea{font-family:var(--font);font-size:15px;color:var(--ink);background:#FCE08A;border:3px solid var(--trim);
    border-radius:12px;padding:8px 16px;cursor:pointer;box-shadow:0 4px 0 var(--shadow);}
  .build-hint.idea{color:#C0563E;font-weight:bold;font-size:15px;}
  /* deco extra nella scena */
  .d-sun,.d-bird,.d-smoke,.d-tree{position:absolute;display:none;pointer-events:none;}
  .d-sun{top:6px;right:14px;font-size:34px;}
  .d-bird{top:30px;left:18px;font-size:22px;}
  .d-smoke{top:-2px;left:50%;transform:translateX(-30px);font-size:24px;}
  .d-tree{bottom:0;left:6px;font-size:46px;}
  /* ===== GALERIE ===== */
  #gallery{position:fixed;inset:0;z-index:64;display:flex;flex-direction:column;align-items:center;
    background:linear-gradient(180deg,#F6EFE0 0%,#EAD9C0 100%);
    padding:max(10px,env(safe-area-inset-top)) 12px calc(env(safe-area-inset-bottom,0px) + 12px);overflow-y:auto;}
  .gallery-back{position:absolute;top:calc(max(10px,env(safe-area-inset-top)) + 6px);left:14px;
    font-family:var(--font);font-size:20px;color:var(--ink);background:rgba(255,246,227,.92);
    border:3px solid var(--trim);border-radius:12px;width:42px;height:38px;cursor:pointer;}
  .gallery-title{font-family:var(--font);font-size:21px;color:var(--ink);margin:6px 0 12px;text-shadow:0 1px 0 #fff;}
  .gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;width:100%;max-width:460px;}
  .gallery-empty{font-family:var(--font);font-size:15px;color:#7a624f;text-align:center;margin-top:30px;grid-column:1/-1;}
  .gcard{position:relative;background:#fff;border:3px solid var(--trim);border-radius:14px;padding:12px 8px 10px;
    display:flex;align-items:flex-end;justify-content:center;min-height:120px;cursor:pointer;box-shadow:0 5px 0 var(--shadow);}
  .gcard .gdel{position:absolute;top:4px;right:6px;width:26px;height:26px;border-radius:50%;border:2px solid var(--trim);
    background:#fff;font-size:13px;line-height:1;cursor:pointer;color:#C0563E;display:flex;align-items:center;justify-content:center;}
  .mini-house{--mc:4;width:96px;background:#EFB94E;border:2px solid var(--trim);border-radius:5px;padding:5px;}
  .mini-roof{height:8px;margin:-9px -7px 4px;background:#C44E3D;border:2px solid var(--trim);border-radius:5px 5px 2px 2px;}
  .mini-grid{display:grid;grid-template-columns:repeat(var(--mc,4),1fr);gap:2px;}
  .mini-cell{aspect-ratio:1/1;background:#3a2920;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px;}
  .mini-cell.has{background:#FFF6E3;}
  .mini-garden{display:flex;justify-content:space-around;background:linear-gradient(180deg,#9FD17F,#7FBE63);
    border-radius:2px;margin-top:3px;padding:1px;}
  .mini-gcell{font-size:9px;line-height:1.3;}

  /* Pulsante Tipp (Giornata dei Mestieri, non in Schwer) */
  #hintBtn{position:fixed;right:14px;bottom:calc(env(safe-area-inset-bottom,0px) + 16px);z-index:42;display:none;
    font-family:var(--font);font-size:15px;color:var(--ink);background:#FCE08A;border:3px solid var(--trim);
    border-radius:14px;padding:9px 15px;cursor:pointer;box-shadow:0 4px 0 var(--shadow);}
  #hintBtn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--shadow);}
  body.menu #hintBtn{display:none!important;}
  /* Barra di conferma (Erledigungstag) */
  #errandAsk{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
    z-index:48;display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(255,246,227,.97);
    border:3px solid var(--trim);border-radius:18px;padding:12px 18px;box-shadow:0 6px 0 var(--shadow);width:min(90vw,360px);}
  #errandAsk.hidden{display:none;}
  body.menu #errandAsk{display:none!important;}
  #errandAsk .ask-item{font-size:46px;line-height:1;}
  #errandAsk .ask-q{font-family:var(--font);font-size:17px;color:var(--ink);}
  #errandAsk .ask-btns{display:flex;gap:12px;}
  #errandAsk .ask-btns button{font-family:var(--font);font-size:18px;color:#fff;border:3px solid var(--trim);
    border-radius:14px;padding:10px 22px;cursor:pointer;box-shadow:0 4px 0 var(--shadow);}
  #errandAsk .ask-yes{background:#5AA469;}
  #errandAsk .ask-no{background:#C0563E;}
  #errandAsk .ask-btns button:active{transform:translateY(2px);box-shadow:0 2px 0 var(--shadow);}
  @keyframes hintGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,196,52,0);}50%{box-shadow:0 0 0 7px rgba(255,196,52,.75);}}
  .win.hint-flash{animation:hintGlow .55s ease-in-out 3;border-radius:8px;}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s!important;animation-iteration-count:1!important;}
    .shutter{transition-duration:.2s;}
    #building.lift-out,#building.lift-in{transition-duration:.18s!important;}
    .smoke-puff{display:none;}
  }
</style>
</head>
<body>

  <div id="stars"></div>
  <div id="moon"></div>
  <div class="cloud" id="c1"></div>
  <div class="cloud" id="c2"></div>
  <!-- Collina di Berat: case bianche terrazzate con tetti rossi (sfondo procedurale) -->
  <div id="berat" aria-hidden="true"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <button class="badge btn" id="homeBtn" aria-label="Menu"><span class="ic">🏠</span></button>
      <div class="badge" id="coins"><span class="ic">🪙</span><span class="val">0</span></div>
      <div class="badge" id="starsTotal"><span class="ic">⭐</span><span class="val">0</span></div>
    </div>
    <div class="hud-right">
      <button class="badge btn" id="shopBtn" aria-label="Negozio"><span class="ic">🛒</span></button>
      <button class="badge btn" id="mute" aria-label="Attiva/disattiva audio"><span class="ic">🔊</span></button>
      <div class="badge" id="floor"><span class="ic">🏢</span><span class="lab">Piano</span>&nbsp;<span class="val">1</span></div>
    </div>
  </div>
  <div id="streak"></div>
  <button id="hintBtn">Tipp 💡</button>

  <!-- Erledigungstag: Frage beim Öffnen eines Fensters -->
  <div id="errandAsk" class="hidden">
    <span class="ask-item"></span>
    <span class="ask-q">Brauchst du das?</span>
    <div class="ask-btns">
      <button class="ask-yes">Ja ✅</button>
      <button class="ask-no">Nein ❌</button>
    </div>
  </div>
  <div id="target">
    <div class="lbl">Trova</div>
    <div class="who"><span class="face">🐱</span><span class="nm">—</span></div>
    <div class="errands"></div>
  </div>

  <!-- Palazzo -->
  <div id="stage">
    <div id="building">
      <div class="roof"><div class="chimney"></div><div class="sign"></div></div>
      <div class="facade"><div id="grid"></div></div>
      <div id="decor"></div>
    </div>
  </div>

  <div id="timer"><div class="tf"></div></div>

  <!-- Obiettivo "1000 finestre": barra cumulativa persistente -->
  <div id="progress">
    <div class="lbl">🪟 0 / 1000</div>
    <div class="track"><div class="fill"></div></div>
  </div>
  <div id="milestone"></div>

  <!-- Momento-Eroe: l'abitante trovato salta in primo piano -->
  <div id="hero" class="hidden" aria-hidden="true">
    <div class="hero-card">
      <span class="hero-sprite"></span>
      <span class="hero-name"></span>
      <span class="hero-job"></span>
    </div>
  </div>

  <!-- "Quadro" del compito finito (Giornata dei Mestieri) -->
  <div id="themeWin" class="hidden" aria-hidden="true">
    <div class="hero-card">
      <span class="theme-scene"></span>
      <span class="theme-title"></span>
      <span class="theme-sub"></span>
    </div>

/* renderSprite(): UNICO punto che traduce un abitante in pixel sullo schermo.
   Rispetta ASSET_MODE; ritorna emoji / <img> / cella di sprite-sheet. */
function renderSprite(inh){
  if(ASSET_MODE === "files"){
    const src = ASSET_DIR + inh.id + "." + ASSET_EXT;
    return `<img class="sprite" src="${src}" alt="${tName(inh)}" draggable="false"
                 onerror="__spriteFallback(this,'${inh.sprite}')">`;
  }
  if(ASSET_MODE === "sheet" && inh.frame){
    const [c,r] = inh.frame;
    const px = SHEET_COLS > 1 ? (c/(SHEET_COLS-1))*100 : 0;
    const py = SHEET_ROWS > 1 ? (r/(SHEET_ROWS-1))*100 : 0;
    return `<div class="sprite sheet" style="background-position:${px}% ${py}%"
                 role="img" aria-label="${tName(inh)}"></div>`;
  }
  return `<span class="sprite-emoji">${inh.sprite}</span>`;   // default emoji
}

/* preloadSprites(): pre-carica gli asset per evitare il flicker alla prima
   apertura. No-op in modalità "emoji". */
function preloadSprites(){
  if(ASSET_MODE === "files"){
    POPULATION.forEach(inh=>{ const img = new Image(); img.src = ASSET_DIR + inh.id + "." + ASSET_EXT; });
  } else if(ASSET_MODE === "sheet"){
    const img = new Image(); img.src = SHEET_SRC;
  }
}

/* initAssets(): imposta le variabili CSS per la sprite-sheet (sorgente e griglia). */
function initAssets(){
  if(ASSET_MODE === "sheet"){
    const root = document.documentElement.style;
    root.setProperty("--sheet-src", "url('" + SHEET_SRC + "')");
    root.setProperty("--sheet-cols", SHEET_COLS);
    root.setProperty("--sheet-rows", SHEET_ROWS);
  }
}

// dimensione griglia in base al piano (cresce con difficoltà; il Piano sale all'infinito)
function gridFor(level){
  const d = State.difficulty;
  if(d === "easy"){                       // Leicht: piccolo, cresce piano
    if(level <= 2) return {c:3,r:3};
    if(level <= 5) return {c:3,r:4};
    return {c:4,r:4};
  }
  if(d === "hard"){                       // Schwer: grande, cresce in fretta
    if(level <= 1) return {c:4,r:4};
    if(level <= 3) return {c:4,r:5};
    if(level <= 6) return {c:5,r:5};
    return {c:5,r:6};
  }
  // Normal (come prima)
  if(level <= 1) return {c:3,r:3};
  if(level <= 3) return {c:4,r:4};
  if(level <= 6) return {c:4,r:5};
  if(level <= 10)return {c:5,r:5};
  return {c:5,r:6};
}
/* Esplora la Città (Hafen/Schloss): griglia più piccola così ogni finestra
   mostra una cosa DIVERSA (niente doppioni), in stile "scoperta". */
function cityGridFor(level){
  const d = State.difficulty;
  if(d === "easy") return level <= 2 ? {c:3,r:3} : {c:3,r:4};   // 9, 12
  if(d === "hard") return {c:4,r:3};                            // 12
  return level <= 1 ? {c:3,r:3} : {c:3,r:4};                    // 9, 12
}

/* Griglie del Memory: SEMPRE un numero pari di finestre (coppie). */
function memGridFor(level){
  const d = State.difficulty;
  if(d === "easy"){ if(level<=1) return {c:3,r:2}; if(level<=3) return {c:4,r:2}; return {c:4,r:3}; } // 6,8,12
  if(d === "hard"){ if(level<=1) return {c:4,r:3}; if(level<=3) return {c:4,r:4}; return {c:5,r:4}; } // 12,16,20
  if(level<=1) return {c:4,r:2}; if(level<=3) return {c:4,r:3}; return {c:4,r:4};                     // 8,12,16
}

/* Atmosfere fisse delle zone città: si vede subito "sono in un altro posto" */
const ZONE_SKIES = {
  porto:    { t:"#4FA3D9", b:"#CDEBF5", g1:"#9CC9D0", g2:"#7BB0BE" },   // porto: cielo di mare, riva
  castello: { t:"#6E5A9C", b:"#D9A8C4", g1:"#5E5478", g2:"#4A4060" },   // castello: crepuscolo regale
};
function updateSky(){
  let s;
  if(State.mode === "city" && ZONE_SKIES[State.zone]){
    s = ZONE_SKIES[State.zone];     // ogni zona ha la sua atmosfera fissa (si vede "sono altrove")
  } else {
    s = SKIES[(State.level - 1) % SKIES.length];   // centro/altri modi: ciclo giorno/notte
  }
  document.body.style.setProperty("--sky-top", s.t);
  document.body.style.setProperty("--sky-bot", s.b);
  document.body.style.setProperty("--ground-1", s.g1);
  document.body.style.setProperty("--ground-2", s.g2);
  document.body.classList.toggle("night", !!s.night);
  document.body.classList.toggle("zone-porto",    State.mode === "city" && State.zone === "porto");
  document.body.classList.toggle("zone-castello", State.mode === "city" && State.zone === "castello");
}

/* =========================================================
   3) IL MOTORE AUDIO — Web Audio API, 100% procedurale
   Nessun file esterno: oscillatori sintetizzati al volo.
   Sbloccato al primo tocco per aggirare l'autoplay di iOS;
   resume() lo risveglia se il device lo sospende dopo standby.
   ========================================================= */
const Audio = (()=>{
  let ctx = null;
  let muted = load("muted", false);   // preferenza audio persistente
  function ensure(){
    if(!ctx){ const AC = window.AudioContext || window.webkitAudioContext; ctx = new AC(); }
    if(ctx.state === "suspended") ctx.resume();
    return ctx;
  }
  function tone(freq, dur, type="triangle", vol=0.18, when=0){
    if(muted) return;
    const c = ensure(); const t = c.currentTime + when;
    const osc = c.createOscillator(); const g = c.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g).connect(c.destination);
    osc.start(t); osc.stop(t + dur + 0.02);
  }
  // --- Musica di sottofondo: melodia dolce e procedurale (scala pentatonica) ---
  let musicOn = load("music", false);
  let musicTimer = null, step = 0;
  const SCALE = [261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
  function softNote(freq, dur, vol, type){
    if(muted) return;
    const c = ensure(); const t = c.currentTime;
    const osc = c.createOscillator(), g = c.createGain();
    osc.type = type || "sine"; osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.25);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g).connect(c.destination);
    osc.start(t); osc.stop(t + dur + 0.05);
  }
  function musicTick(){
    if(muted || !musicOn) return;
    softNote(SCALE[(Math.random()*SCALE.length)|0], 1.7, 0.045, "sine");            // melodia
    if(step % 4 === 0) softNote(SCALE[(Math.random()*3)|0] / 2, 2.6, 0.038, "triangle"); // basso morbido
    step++;
  }
  function startMusic(){ if(musicTimer) return; ensure(); musicTimer = setInterval(musicTick, 1150); musicTick(); }
  function stopMusic(){ clearInterval(musicTimer); musicTimer = null; }
  return {
    get state(){ return ctx ? ctx.state : "none"; },
    get muted(){ return muted; },
    get musicOn(){ return musicOn; },
    toggle(){ muted = !muted; save("muted", muted); if(!muted) this.unlock(); if(muted) stopMusic(); else if(musicOn) startMusic(); return muted; },
    toggleMusic(){ musicOn = !musicOn; save("music", musicOn); if(musicOn){ this.unlock(); startMusic(); } else stopMusic(); return musicOn; },
    unlock(){ ensure(); tone(440,0.001,"sine",0.0001); if(musicOn) startMusic(); }, // gesto utente: sveglia il contesto (+musica)
    resume(){ if(ctx && ctx.state === "suspended") ctx.resume(); }, // risveglio resiliente
    open(pitch){ tone(pitch, 0.18, "triangle", 0.16); },        // bussata: nota dell'abitante
    success(){                                                  // arpeggio allegro
      [523.25,659.25,783.99,1046.5].forEach((f,i)=>tone(f,0.22,"triangle",0.18,i*0.075));
      tone(1318.5,0.5,"sine",0.10,0.30);
    },
    fail(){                                                     // "errore ironico", non punitivo
      if(muted) return;
      const c = ensure(); const t = c.currentTime;
      const osc = c.createOscillator(); const g = c.createGain();
      osc.type="sawtooth"; osc.frequency.setValueAtTime(330,t);
      osc.frequency.exponentialRampToValueAtTime(196,t+0.22);  // bweep discendente
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.12,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
      osc.connect(g).connect(c.destination); osc.start(t); osc.stop(t+0.3);
    }
  };
})();

/* =========================================================
   4) IL MOTORE PARTICELLE — Coriandoli su Canvas
   Traiettoria + gravità + dissolvenza, parte dalla finestra.
   ========================================================= */
const Confetti = (()=>{
  const cv = document.getElementById("fx");
  const ctx = cv.getContext("2d");
  let parts = [], raf = null;
  const COLORS = ["#F4C430","#E07A4A","#5BB85F","#5BAEE0","#E58FB0","#8B79C9","#C44E3D"];
  function resize(){ cv.width = innerWidth*devicePixelRatio; cv.height = innerHeight*devicePixelRatio;
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
  addEventListener("resize", resize); resize();

  function burst(x, y, n=110){
    for(let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2, sp = 3+Math.random()*8;
      parts.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-5,
        g:0.22+Math.random()*0.12, w:5+Math.random()*7, h:8+Math.random()*8,
        rot:Math.random()*6.28, vr:(Math.random()-.5)*0.4,
        col:COLORS[(Math.random()*COLORS.length)|0], life:60+Math.random()*40 });
    }
    if(!raf) raf = requestAnimationFrame(loop);
  }
  function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts = parts.filter(p=>p.life>0);
    for(const p of parts){
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life--;
      ctx.save(); ctx.globalAlpha = Math.max(0, Math.min(1, p.life/30));
      ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle = p.col;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
    }
    if(parts.length) raf = requestAnimationFrame(loop);
    else { ctx.clearRect(0,0,cv.width,cv.height); raf=null; }
  }
  return { burst };
})();

/* =========================================================
   5) LOGICA DELLA GRIGLIA — Genera, disegna, risolvi
   ========================================================= */
const grid = document.getElementById("grid");
const building = document.getElementById("building");

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function pick(a){ return a[(Math.random()*a.length)|0]; }

// popolazione attiva: filtrata per zona in modalità città, altrimenti completa
function activePopulation(){
  if(State.mode === "city" && State.zone) return POPULATION.filter(p => p.zone === State.zone);
  return POPULATION;
}

/* Riempie `bag` fino a `total` pescando in modo bilanciato da `srcPool`
   (mazzo mescolato ripetuto): ogni faccia compare quasi lo stesso numero di volte. */
function fillBalanced(bag, srcPool, total){
  while(bag.length < total){
    const batch = shuffle(srcPool.slice());
    for(const inh of batch){ if(bag.length < total) bag.push(inh); }
  }
}

/* Dispone gli abitanti nella griglia c×r evitando qualsiasi coppia uguale
   adiacente (a sinistra o sopra). Greedy: in ogni cella sceglie, tra i tipi
   ancora disponibili e diversi dai vicini, quello con più copie rimanenti
   (a parità, a caso). Con conteggi bilanciati funziona sempre. */
function arrangeNoAdjacent(bag, c, r){
  const total = c * r;
  const types = [], idx = new Map();
  bag.forEach(inh=>{
    if(!idx.has(inh.id)){ idx.set(inh.id, types.length); types.push({ inh, n:0 }); }
    types[idx.get(inh.id)].n++;
  });
  const grid = new Array(total).fill(null);
  for(let pos=0; pos<total; pos++){
    const col = pos % c, row = (pos / c) | 0;
    const leftId = col > 0 && grid[pos-1] ? grid[pos-1].id : null;
    const upId   = row > 0 && grid[pos-c] ? grid[pos-c].id : null;
    let cand = types.filter(t => t.n>0 && t.inh.id!==leftId && t.inh.id!==upId);
    if(!cand.length) cand = types.filter(t => t.n>0 && t.inh.id!==leftId); // rilassa il vincolo verticale
    if(!cand.length) cand = types.filter(t => t.n>0);                      // ultimo fallback
    const maxN = Math.max(...cand.map(t => t.n));
    const best = pick(cand.filter(t => t.n === maxN));   // tra i più frequenti, scelta casuale
    best.n--; grid[pos] = best.inh;
  }
  return grid;
}

function newLevel(){
  const themedCity = (State.mode === "city" && ZONE_SETS[State.zone]);
  const {c,r} = (State.mode === "memory") ? memGridFor(State.level)
              : themedCity ? cityGridFor(State.level)
              : gridFor(State.level);
  const total = c*r;
  const pool = activePopulation();
  State.wrongThisLevel = 0;
  State.locked = false;

  // imposta densità griglia: il CSS calcola la dimensione cella da sé
  const gap = (c>=5 || r>=5) ? 7 : 10;
  grid.style.setProperty("--cols", c);
  grid.style.setProperty("--rows", r);
  grid.style.setProperty("--gap", gap + "px");

  // Costruisci il "sacchetto" del piano in modo BILANCIATO (ogni faccia quasi
  // lo stesso numero di volte), poi lo disponiamo SENZA doppioni adiacenti.
  let inhabitants;
  if(State.mode === "memory"){
    // MEMORY: coppie di animali, mescolate a caso
    const nPairs = total / 2;
    const distinct = shuffle(pool.slice()).slice(0, nPairs);
    const doubled = [];
    distinct.forEach(a => { doubled.push(a, a); });
    inhabitants = shuffle(doubled);
    State.target = null; State.errands = [];
    State.memFirst = null; State.memPairsLeft = nPairs; State.memLock = false;
  } else {
    let bag;
    if(State.mode === "errands"){
      // GIORNATA DEI MESTIERI: scegli un TEMA (un compito) con 3 oggetti da procurarsi
      State.theme = pick(THEMES);
      State.errands = State.theme.items.map(it => ({ item: it, done:false }));
      State.target = null;
      bag = [];
      fillBalanced(bag, pool, total);   // animali vari come negozianti (gli oggetti si assegnano dopo)
    } else {
      // CLASSICO / CITTÀ
      const zoneSet = (State.mode === "city") ? ZONE_SETS[State.zone] : null;
      if(zoneSet){
        // Esplora la Città (Hafen/Schloss): ogni finestra una cosa DIVERSA
        const pool2 = zoneSet.cast.concat([zoneSet.target]);   // cast + personaggio speciale
        State.target = pick(pool2);
        State.errands = [];
        const others = shuffle(pool2.filter(p => p.id !== State.target.id));
        bag = [State.target];
        for(const o of others){ if(bag.length >= total) break; bag.push(o); }
        while(bag.length < total) bag.push(pick(others));      // sicurezza (col cap non serve)
      } else {
        // il bersaglio compare ESATTAMENTE una volta (classico / centro)
        State.target = pick(pool);
        State.errands = [];
        const others = pool.filter(p => p.id !== State.target.id);
        bag = [State.target];
        fillBalanced(bag, others.length ? others : pool, total);
      }
    }
    // disposizione: nessun abitante uguale affiancato (orizzontale o verticale)
    inhabitants = arrangeNoAdjacent(bag, c, r);
  }

  // Esplora la Città: nascondi una scoperta "wow" in una finestra (non quella del bersaglio)
  let wowIndex = -1;
  if(State.mode === "city" && ZONE_SETS[State.zone]){
    const wow = pick(ZONE_SETS[State.zone].wows);
    do { wowIndex = (Math.random()*inhabitants.length)|0; } while(inhabitants[wowIndex].id === State.target.id);
    inhabitants[wowIndex] = wow;
  }

  // costruisci celle + DOM
  grid.innerHTML = "";
  State.cells = inhabitants.map((inh, i)=>{
    const el = document.createElement("div");
    el.className = "win";
    el.style.setProperty("--sh", inh.sh);
    el.style.setProperty("--sh-d", shade(inh.sh,-18));
    el.innerHTML =
      `<div class="room"><span class="inh">${renderSprite(inh)}</span>
         <span class="speech"></span></div>
       <div class="shutter l"></div><div class="shutter r"></div>`;
    const cell = { id:i, inh, state:"closed", el };
    cell.wow = (i === wowIndex);
    el.addEventListener("pointerdown", (e)=>{ e.preventDefault(); onTap(cell); }, {passive:false});
    grid.appendChild(el);
    return cell;
  });

  if(State.mode === "errands") assignErrandItems();  // 3 oggetti del tema + distrattori

  updateHUD();
  updateSky();          // sposta l'ora del giorno in base al piano
  if(State.mode !== "memory" && State.mode !== "errands"){
    placeBug();         // nasconde (a volte) la coccinella d'oro
    if(!(State.mode === "city" && ZONE_SETS[State.zone])) placeRareGuest();  // niente ospite "fuori tema" al porto/castello
  }
  updateDistrict();     // aggiorna l'insegna del quartiere
  startFloorTimer(total); // avvia il cronometro se la sfida è attiva
}

/* Assegna a ogni finestra l'oggetto che il negoziante offre: i 3 oggetti del
   tema su 3 finestre distinte, gli altri ricevono "distrattori" (oggetti di
   altri temi, mai uguali ai 3 richiesti). */
function assignErrandItems(){
  const items = State.errands.map(e => e.item);                 // i 3 oggetti richiesti (già distinti)
  const distractPool = shuffle(ALL_ITEMS.filter(x => !items.includes(x)));
  const total = State.cells.length;
  // costruisci offerte TUTTE DIVERSE: prima i 3 richiesti, poi distrattori distinti
  const offers = items.slice();
  for(const d of distractPool){ if(offers.length >= total) break; offers.push(d); }
  while(offers.length < total) offers.push(pick(ALL_ITEMS));     // sicurezza (raro)
  shuffle(offers);
  State.cells.forEach((c, i)=>{ c.offerItem = offers[i]; });
  // nella Giornata dei Mestieri la finestra mostra l'OGGETTO, non un animale
  State.cells.forEach(c => { c.el.querySelector(".inh").textContent = c.offerItem; });
}

function onTap(cell){
  // input istantaneo (pointerdown = zero ritardo su touch).
  if(State.locked) return;
  if(State.mode === "memory"){ onTapMemory(cell); return; }
  if(cell.state === "opening" || cell.state === "open" || cell.state === "solved") return;

  Audio.resume();                 // risveglia l'audio se il device l'ha sospeso
  cell.state = "open";
  cell.el.classList.add("open");
  Audio.open(cell.inh.audioPitch);
  countWindow();                  // progresso verso le 1000 finestre
  if(State.mode !== "errands"){
    if(cell.bug && !cell.bugTaken) revealBug(cell);   // coccinella d'oro
    if(cell.rare && !cell.rareTaken) revealRare(cell); // ospite speciale (bonus)
    markDiscovered(cell.inh.id);    // sblocca nell'album (timbro NUOVO la prima volta)
  }

  if(State.mode === "errands"){
    resolveErrand(cell);
  } else if(cell.wow && !cell.wowTaken){
    revealWow(cell);
  } else if(cell.inh.id === State.target.id){
    resolveCorrect(cell);
  } else {
    resolveWrong(cell);
  }
}

/* MEMORY (Paare finden): apri due finestre; se gli animali combaciano restano
   aperte, altrimenti si richiudono. Trovate tutte le coppie -> piano successivo. */
function onTapMemory(cell){
  if(State.memLock) return;
  if(cell.state === "open" || cell.state === "solved") return;
  Audio.resume();
  cell.state = "open"; cell.el.classList.add("open");
  Audio.open(cell.inh.audioPitch);
  countWindow(); markDiscovered(cell.inh.id);
  if(!State.memFirst){ State.memFirst = cell; return; }
  const first = State.memFirst; State.memFirst = null;
  if(first === cell) return;
  if(first.inh.id === cell.inh.id){
    // coppia trovata!
    first.state = cell.state = "solved";
    first.el.classList.add("solved"); cell.el.classList.add("solved");
    const rect = cell.el.getBoundingClientRect();
    Audio.open(880); setTimeout(()=>Audio.open(1174.66), 80);
    Confetti.burst(rect.left+rect.width/2, rect.top+rect.height/2, 40);
    addCoins(8, rect.left+rect.width/2, rect.top);
    State.memPairsLeft--; updateMemCount();
    if(State.memPairsLeft <= 0){ State.locked = true; setTimeout(()=> showMemoryWin(()=> winFloor(cell)), 320); }
  } else {
    // niente coppia: richiudi entrambe dopo una breve pausa (per memorizzare)
    State.memLock = true; State.wrongThisLevel++; Audio.fail();
    setTimeout(()=>{
      [first, cell].forEach(c=>{ if(c.state !== "solved"){ c.el.classList.remove("open"); c.state = "closed"; } });
      State.memLock = false;
    }, 850);
  }
}
function updateMemCount(){
  const lbl = document.querySelector("#target .lbl");
  if(lbl) lbl.textContent = T("memFind") + " 🧩 (" + State.memPairsLeft + ")";
}

function resolveCorrect(cell){
  State.locked = true;                       // blocca subito (durante il Momento-Eroe)
  cell.state = "solved";
  cell.el.classList.add("solved");
  const rect = cell.el.getBoundingClientRect();
  // premio monete (+ bonus "Perfetto" senza errori) + gestione streak
  const perfect = State.wrongThisLevel === 0;
  if(perfect) State.streak++; else State.streak = 0;
  const reward = 12 + (perfect ? 8 : 0) + Math.min(State.streak*3, 30);
  addCoins(reward, rect.left+rect.width/2, rect.top);
  showStreak(perfect);
  if(perfect && State.streak > 0 && State.streak % 3 === 0) setTimeout(streakBonus, 520);
  showHero(cell.inh, ()=> winFloor(cell));   // l'eroe salta in primo piano, poi l'ascensore
}
function streakBonus(){
  const cx = innerWidth/2, cy = innerHeight*0.35;
  addStars(1); addCoins(25, cx, cy);
  Confetti.burst(cx, cy, 120);
  partyBalloons(8);
  Audio.success();
  toast(T("streakBonus").replace("%n", State.streak) + "  +1⭐ +25🪙", 2200);
}

/* GIORNATA DEI MESTIERI: la finestra mostra un OGGETTO. Il bambino decide con
   Ja/Nein se serve per il compito. "Ja" giusto -> raccolto; "Ja" sbagliato ->
   errore; "Nein" -> richiude senza penalità. */
let askCell = null;
function resolveErrand(cell){
  askCell = cell;
  State.locked = true;                       // niente altri tocchi finché non decide
  const ask = document.getElementById("errandAsk");
  ask.querySelector(".ask-item").textContent = cell.offerItem;
  ask.querySelector(".ask-q").textContent    = T("askQ");
  ask.querySelector(".ask-yes").textContent  = T("askYes");
  ask.querySelector(".ask-no").textContent   = T("askNo");
  ask.classList.remove("hidden");
}
function errandDecide(yes){
  const cell = askCell; askCell = null;
  const ask = document.getElementById("errandAsk"); ask.classList.add("hidden");
  State.locked = false;
  if(!cell) return;
  if(yes){
    const e = State.errands.find(x => x.item === cell.offerItem && !x.done);
    if(e){
      // sì giusto: ingrediente necessario raccolto
      e.done = true;
      cell.state = "solved"; cell.el.classList.add("solved");
      Audio.open(880); setTimeout(()=>Audio.open(1174.66), 80);
      const rect = cell.el.getBoundingClientRect();
      Confetti.burst(rect.left+rect.width/2, rect.top+rect.height/2, 45);
      addCoins(6, rect.left+rect.width/2, rect.top);
      renderErrands();
      if(State.errands.every(x => x.done)){
        State.locked = true;
        showThemeResult(State.theme, ()=> winFloor(cell));
      }
    } else {
      // sì sbagliato: non serve (o già preso) -> errore, si richiude
      Audio.fail(); gagPop(cell); State.wrongThisLevel++;
      cell.el.classList.remove("open"); cell.state = "closed";
    }
  } else {
    // "no": si richiude senza penalità (può tornarci)
    Audio.open(330);
    cell.el.classList.remove("open"); cell.state = "closed";
  }
}

/* Celebrazione + EFFETTO ASCENSORE: condivisa da Classico, Città e Mestieri. */
function starsFor(wrong){ return wrong === 0 ? 3 : (wrong <= 2 ? 2 : 1); }
function showStars(n){
  const wrap = document.createElement("div");
  wrap.className = "stars-pop";
  for(let i=0; i<3; i++){
    const on = i < n;
    const s = document.createElement("span");
    s.className = "star " + (on ? "on" : "off");
    s.textContent = on ? "⭐" : "☆";
    s.style.animationDelay = (i*0.15) + "s";
    wrap.appendChild(s);
  }
  document.body.appendChild(wrap);
  setTimeout(()=>{ wrap.remove(); }, 1500);
}

function winFloor(cell){
  State.locked = true;
  questProgress("floors");
  if(State.wrongThisLevel === 0) questProgress("perfect");
  Audio.success();
  building.classList.add("celebrate");
  setTimeout(()=>building.classList.remove("celebrate"), 600);
  const rect = cell.el.getBoundingClientRect();
  Confetti.burst(rect.left+rect.width/2, rect.top+rect.height/2);
  awardSpeed(rect);          // bonus velocità se la sfida a tempo è attiva

  // ⭐ stelle in base agli errori (solo modi di ricerca, non memory)
  const showStarsNow = State.mode !== "memory";
  if(showStarsNow){ const earned = starsFor(State.wrongThisLevel); showStars(earned); addStars(earned); }
  const extra = showStarsNow ? 700 : 0;

  // a) chiusura rapida delle finestre aperte per errore
  setTimeout(()=>{
    State.cells.forEach(c=>{
      if(c.state !== "solved"){ c.el.classList.remove("open","wrong","say"); c.state = "closed"; }
    });
  }, 450);
  // b) il piano esce in basso...
  setTimeout(()=>{ building.classList.add("lift-out"); }, 700 + extra);
  // c) ...e sale il nuovo piano
  setTimeout(()=>{
    building.classList.remove("lift-out");
    State.level++;
    newLevel();
    enterBuilding();
    State.locked = true;
    setTimeout(()=>{ State.locked = false; }, 500);
  }, 700 + 320 + extra);
}

/* MOMENTO-EROE: l'abitante trovato salta grande in primo piano con nome e

/* =========================================================
   UTILITY
   ========================================================= */
function shade(hex,p){ // schiarisce/scurisce un colore esadecimale
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r+p)); g=Math.max(0,Math.min(255,g+p)); b=Math.max(0,Math.min(255,b+p));
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
// salvataggio resiliente (su GitHub Pages persiste; in sandbox degrada senza crash)
function save(k,v){ try{ localStorage.setItem("1000w_"+k, JSON.stringify(v)); }catch(e){} }
function load(k,d){ try{ const v=localStorage.getItem("1000w_"+k); return v?JSON.parse(v):d; }catch(e){ return d; } }

const shopEl = document.getElementById("shop");
function openShop(){ shopWasLocked = State.locked; State.locked = true; renderShop(); shopEl.classList.remove("hidden"); }

function flashCant(btn, msg){ const t=btn.textContent; btn.classList.add("cant"); btn.textContent=msg||T("notEnough"); setTimeout(()=>{ btn.textContent=t; btn.classList.remove("cant"); }, 1100); }

function renderShop(){
  document.querySelector("#shop .shop-title").textContent = T("shopTitle");
  document.querySelector("#shop .shop-coins b").textContent = State.coins;
  const ss = document.querySelector("#shop .shop-stars b"); if(ss) ss.textContent = State.stars;
  const body = document.querySelector("#shop .shop-body"); body.innerHTML = "";
  const sec = (t)=>{ const h=document.createElement("div"); h.className="shop-sec"; h.textContent=t; body.appendChild(h); };

  sec(T("secSkins"));
  SKINS.forEach(s=>{
    const row=document.createElement("div"); row.className="shop-row";
    const sw=document.createElement("div"); sw.className="swatch"; sw.style.background=s.bldg;
    const nm=document.createElement("div"); nm.className="nm"; nm.textContent=itemName(s);
    row.append(sw, nm);
    let btn;
    if(!(s.price===0 || owns(s.id))){
      if(s.starPrice){
        btn = shopButton(T("buy")+" "+s.starPrice+"⭐", State.stars>=s.starPrice?"":"cant");
        btn.addEventListener("pointerdown",(e)=>{ e.preventDefault();
          if(State.stars<s.starPrice){ flashCant(btn, T("notEnoughStars")); return; }
          spendStars(s.starPrice); State.owned.push(s.id); save("owned",State.owned); applySkin(s.id); renderShop();
        },{passive:false});
      } else {
        btn = shopButton(T("buy")+" "+s.price+"🪙", State.coins>=s.price?"":"cant");
        btn.addEventListener("pointerdown",(e)=>{ e.preventDefault();
          if(State.coins<s.price){ flashCant(btn); return; }
          spend(s.price); State.owned.push(s.id); save("owned",State.owned); applySkin(s.id); renderShop();
        },{passive:false});
      }
    } else if(State.skin===s.id){
      btn = shopButton(T("equipped"),"owned"); btn.disabled=true;
    } else {
      btn = shopButton(T("equip"),"owned");
      btn.addEventListener("pointerdown",(e)=>{ e.preventDefault(); applySkin(s.id); renderShop(); },{passive:false});
    }
    row.appendChild(btn); body.appendChild(row);
  });

  sec(T("secDecor"));
  DECOS.forEach(d=>{
    const row=document.createElement("div"); row.className="shop-row";
    const em=document.createElement("div"); em.className="emoji"; em.textContent=d.emoji;
    const nm=document.createElement("div"); nm.className="nm"; nm.textContent=itemName(d);
    row.append(em, nm);
    let btn;
    if(!owns(d.id)){
      btn = shopButton(T("buy")+" "+d.price+"🪙", State.coins>=d.price?"":"cant");
      btn.addEventListener("pointerdown",(e)=>{ e.preventDefault();
        if(State.coins<d.price){ flashCant(btn); return; }
        spend(d.price); State.owned.push(d.id); save("owned",State.owned);
        State.decoActive.push(d.id); save("decoActive",State.decoActive); applyDecos(); renderShop();
      },{passive:false});
    } else {
      const active = State.decoActive.includes(d.id);
      btn = shopButton(active?T("equipped"):T("equip"), active?"active":"owned");
      btn.addEventListener("pointerdown",(e)=>{ e.preventDefault();
        const i=State.decoActive.indexOf(d.id);
        if(i>=0) State.decoActive.splice(i,1); else State.decoActive.push(d.id);
        save("decoActive",State.decoActive); applyDecos(); renderShop();
      },{passive:false});
    }
    row.appendChild(btn); body.appendChild(row);
  });
}

/* ===== OBIETTIVO DEL GIORNO (mini-missione che cambia ogni giorno) ===== */
const QUESTS = [
  { id:"floors",  type:"floors",  target:5,  key:"qFloors"  },
  { id:"windows", type:"windows", target:40, key:"qWindows" },
  { id:"rare",    type:"rare",    target:2,  key:"qRare"    },
  { id:"perfect", type:"perfect", target:3,  key:"qPerfect" },
];
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function ensureQuest(){
  let q = load("quest", null);
  const today = todayStr();
  if(!q || q.date !== today){
    const d = new Date();
    const idx = (d.getFullYear()*372 + d.getMonth()*31 + d.getDate()) % QUESTS.length;
    const tpl = QUESTS[idx];
    q = { id:tpl.id, type:tpl.type, target:tpl.target, key:tpl.key, prog:0, done:false, date:today };
    save("quest", q);
  }
  State.quest = q;
}
function questProgress(type, n){
  const q = State.quest; if(!q || q.done || q.type !== type) return;
  q.prog += (n || 1);
  if(q.prog >= q.target){
    q.prog = q.target; q.done = true;
    const reward = 50;
    addCoins(reward, innerWidth/2, innerHeight*0.45);
    Confetti.burst(innerWidth/2, innerHeight*0.42, 80);
    Audio.success();
    toast(T("questDone").replace("%c", reward + " 🪙"), 2200);
  }
  save("quest", q);
  renderQuest();
}
function renderQuest(){
  const el = document.getElementById("questBanner");
  if(!el || !State.quest) return;
  const q = State.quest;
  const label = T(q.key).replace("%n", q.target);
  el.innerHTML = `<span class="q-title">🎯 ${T("questTitle")}</span>` +
    `<span class="q-text${q.done ? " done" : ""}">${label} · ${Math.min(q.prog,q.target)}/${q.target}${q.done ? " ✓" : ""}</span>`;
}

// --- Gag: l'emoji dell'azione svolazza via (densità "brulicante") ---
function gagPop(cell){
  const seg=[...tAction(cell.inh).trim()];
  let em=seg[seg.length-1];
  if(em==="\uFE0F" && seg.length>=2) em=seg[seg.length-2]+em;   // emoji + selettore di variante
  if(!em) return;
  const rect=cell.el.getBoundingClientRect();
  const s=document.createElement("div"); s.className="gag"; s.textContent=em;
  s.style.left=(rect.left+rect.width/2-9)+"px"; s.style.top=(rect.top+rect.height*0.28)+"px";
  document.body.appendChild(s); setTimeout(()=>s.remove(), 900);
}
