// --- Sfida a tempo (opzionale, non punitiva) ---
const timerEl = document.getElementById("timer");
const timerFill = timerEl.querySelector(".tf");
let floorTimeout = null, floorDur = 0;
function startFloorTimer(total){
  clearTimeout(floorTimeout);
  if(!State.challenge) return;
  floorDur = 4500 + total*250;
  State.floorStart = performance.now();
  timerFill.classList.remove("expired");
  timerFill.style.transition = "none"; timerFill.style.width = "100%";
  void timerFill.offsetWidth;
  timerFill.style.transition = "width " + floorDur + "ms linear"; timerFill.style.width = "0%";
  floorTimeout = setTimeout(()=>{ timerFill.classList.add("expired"); }, floorDur);
}
function awardSpeed(rect){
  if(!State.challenge || !State.floorStart) return;
  clearTimeout(floorTimeout);
  const elapsed = performance.now() - State.floorStart; State.floorStart = 0;
  timerFill.style.transition = "none";    // congela la barra
  if(elapsed < floorDur){
    const bonus = Math.round((1 - elapsed/floorDur) * 30);
    if(bonus>0){ addCoins(bonus, rect.left+rect.width/2, rect.top-20); toast(T("fast").replace("%c", bonus+" 🪙"), 1100); }
  }
}

function renderCity(){
  document.querySelector("#citymap .city-title").textContent = T("cityTitle");
  const wrap = document.querySelector("#citymap .city-zones"); wrap.innerHTML = "";
  ZONES.forEach(z=>{
    const unlocked = State.zonesUnlocked.includes(z.id);
    const btn = document.createElement("button");
    btn.className = "zonebtn" + (unlocked ? "" : " locked");
    btn.style.setProperty("--zaccent", z.accent);
    btn.innerHTML = `<span class="zico">${z.emoji}</span><span class="zname">${T("zone"+z.key)}</span>` +
                    (unlocked ? "" : `<span class="zlock">🔒 ${z.price} 🪙</span>`);
    btn.addEventListener("pointerdown",(e)=>{ e.preventDefault();
      if(State.zonesUnlocked.includes(z.id)){
        startMode("city", z.id);
      } else if(State.coins >= z.price){
        State.coins -= z.price; save("coins", State.coins);
        State.zonesUnlocked.push(z.id); save("zones", State.zonesUnlocked);
        document.querySelector("#coins .val").textContent = State.coins;
        renderCity();
      } else {
        btn.classList.add("shake"); setTimeout(()=>btn.classList.remove("shake"), 400);
      }
    }, {passive:false});
    wrap.appendChild(btn);
  });
}

/* Collina di Berat: case bianche terrazzate con tetti rossi e tante finestrelle,
   generate proceduralmente in SVG — lo sfondo della "città delle mille finestre". */
function buildBerat(){
  const W = 1000, H = 600;
  const rnd = (a,b)=> a + Math.random()*(b-a);
  const terraces = [
    { baseY:600, hr:[70,110], wr:[52,84], wall:"#F1E7D6", roof:"#C0563E", win:"#6E4A2F" }, // vicine
    { baseY:512, hr:[58,92],  wr:[44,70], wall:"#E7DCC9", roof:"#B14E39", win:"#7A5436" },
    { baseY:430, hr:[48,76],  wr:[38,60], wall:"#DBD1BF", roof:"#A6492F", win:"#8A6244" }, // lontane (più chiare)
  ];
  let s = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">`;
  s += `<path d="M0,${H} L0,360 Q260,300 520,340 T1000,320 L1000,${H} Z" fill="rgba(150,170,120,.18)"/>`;
  terraces.forEach(t=>{
    let x = -30;
    while(x < W+30){
      const w = rnd(t.wr[0], t.wr[1]);
      const cx = x + w/2;
      const edge = Math.min(1, Math.abs(cx - W/2)/(W*0.5));   // 0 al centro, 1 ai bordi
      const h = rnd(t.hr[0], t.hr[1]) * (0.78 + 0.32*edge);
      const y = t.baseY - h - rnd(0,26)*(0.3 + 0.9*edge);     // ai lati le case salgono (anfiteatro)
      s += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${t.wall}" stroke="rgba(110,67,39,.16)" stroke-width="1"/>`;
      const ov = 7, rh = Math.min(22, h*0.30);               // tetto rosso sporgente
      s += `<polygon points="${(x-ov).toFixed(1)},${y.toFixed(1)} ${(x+w+ov).toFixed(1)},${y.toFixed(1)} ${(x+w-3).toFixed(1)},${(y-rh).toFixed(1)} ${(x+3).toFixed(1)},${(y-rh).toFixed(1)}" fill="${t.roof}"/>`;
      // tante finestrelle: la firma di Berat
      const pad=7, ww=7, wh=9, gx=6, gy=8;
      const cols = Math.max(2, Math.floor((w - pad*2 + gx)/(ww+gx)));
      const rows = Math.max(2, Math.floor((h - pad*2 + gy)/(wh+gy)));
      const usedW = cols*ww + (cols-1)*gx, usedH = rows*wh + (rows-1)*gy;
      const ox = x + (w-usedW)/2, oy = y + (h-usedH)/2 + 2;
      for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
        s += `<rect x="${(ox+c*(ww+gx)).toFixed(1)}" y="${(oy+r*(wh+gy)).toFixed(1)}" width="${ww}" height="${wh}" rx="1.5" fill="${t.win}" opacity="0.85"/>`;
      }
      x += w + rnd(2,9);
    }
  });
  s += `</svg>`;
  document.getElementById("berat").innerHTML = s;
}

// --- Schwierigkeit: ciclo Leicht → Normal → Schwer ---
document.getElementById("diffBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault();
  const order = ["easy","normal","hard"];
  const next = order[(order.indexOf(State.difficulty) + 1) % order.length];
  State.difficulty = next; save("difficulty", next);
  applyDiffLabel();
  Audio.unlock(); Audio.open(next==="hard"?392:next==="easy"?659:523);
}, {passive:false});

// --- Tipp (Giornata dei Mestieri) ---
document.getElementById("hintBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault(); Audio.unlock(); showHint(); }, {passive:false});

// --- Erledigungstag: pulsanti Ja/Nein ---
document.querySelector("#errandAsk .ask-yes").addEventListener("pointerdown",(e)=>{ e.preventDefault(); errandDecide(true); }, {passive:false});
document.querySelector("#errandAsk .ask-no").addEventListener("pointerdown",(e)=>{ e.preventDefault(); errandDecide(false); }, {passive:false});

// --- Musica di sottofondo: toggle ---
document.getElementById("musicBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault();
  Audio.toggleMusic(); applyMusicLabel();
}, {passive:false});

// --- Menu modalità, mappa città, pulsante Home ---
const startScreen = document.getElementById("start");
document.getElementById("toModesBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault(); Audio.unlock(); showModesPage(); }, {passive:false});
document.getElementById("backToWelcome").addEventListener("pointerdown",(e)=>{ e.preventDefault(); showWelcomePage(); }, {passive:false});
document.getElementById("modeClassicBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault(); startMode("classic", null); }, {passive:false});
document.getElementById("modeErrandsBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault(); startMode("errands", null); }, {passive:false});
document.getElementById("modeCityBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault(); Audio.unlock(); openCity(); }, {passive:false});
document.getElementById("modeMemoryBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault(); startMode("memory", null); }, {passive:false});
document.querySelector("#citymap .city-back").addEventListener("pointerdown",(e)=>{ e.preventDefault(); closeCity(); }, {passive:false});
cityEl.addEventListener("pointerdown",(e)=>{ if(e.target===cityEl){ e.preventDefault(); closeCity(); } }, {passive:false});
document.getElementById("homeBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault(); goHome(); }, {passive:false});

// --- Bau-Modus ---
document.getElementById("modeBuildBtn").addEventListener("pointerdown",(e)=>{ e.preventDefault(); openBuild(); }, {passive:false});
buildEl.querySelector(".build-back").addEventListener("pointerdown",(e)=>{ e.preventDefault(); closeBuild(); }, {passive:false});
buildEl.querySelectorAll(".build-tabs button").forEach(btn=>{
  btn.addEventListener("pointerdown",(e)=>{ e.preventDefault(); setBuildTab(btn.dataset.tab); }, {passive:false});
});
buildEl.querySelector(".build-clear").addEventListener("pointerdown",(e)=>{ e.preventDefault();
  const cb = buildEl.querySelector(".build-clear");
  if(!buildClearArmed){
    buildClearArmed = true; cb.textContent = "🗑️ ?";
    clearTimeout(buildClearTimer);
    buildClearTimer = setTimeout(()=>{ buildClearArmed = false; cb.textContent = T("bClear"); }, 2500);
    return;
  }
  buildClearArmed = false; clearTimeout(buildClearTimer);
  State.build.cells = new Array((State.build.cols||4)*(State.build.rows||4)).fill(null);
  State.build.garden = new Array(5).fill(null);
  saveBuild(); renderBuildHouse();
  cb.textContent = T("bClear");
}, {passive:false});
buildEl.querySelector(".build-show").addEventListener("pointerdown",(e)=>{ e.preventDefault();
  saveToGallery();
  Audio.success(); Confetti.burst(innerWidth/2, innerHeight*0.4, 80);
  openGallery();
}, {passive:false});
buildEl.querySelector(".build-idea").addEventListener("pointerdown",(e)=>{ e.preventDefault(); showBuildIdea(); }, {passive:false});
galleryEl.querySelector(".gallery-back").addEventListener("pointerdown",(e)=>{ e.preventDefault(); closeGallery(); }, {passive:false});

// --- Tutorial: chiusura ---
document.querySelector("#tutorial .tut-ok").addEventListener("pointerdown",(e)=>{ e.preventDefault(); if(tutClose) tutClose(); }, {passive:false});
tutEl.addEventListener("pointerdown",(e)=>{ if(e.target===tutEl && tutClose){ e.preventDefault(); tutClose(); } }, {passive:false});

// --- Service Worker: offline + installabile come app (solo su http/https) ---
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}

</script>
</body>
</html>
